[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "reyn"
version = "0.1.0a1"
description = "LLM-driven phase execution engine with a Markdown DSL"
requires-python = ">=3.11"
license = { text = "MIT" }
readme = "README.md"
authors = [
    # Replace before release: update name/email to maintainer contact
    { name = "Reyn Contributors", email = "reyn-dev@example.com" },
]
keywords = [
    "llm",
    "agent",
    "workflow",
    "dsl",
    "multi-agent",
    "orchestration",
    "os",
    "phase",
    "LLM workflow",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: System",
    "Typing :: Typed",
]

dependencies = [
    "litellm>=1.0",
    "pydantic>=2.0",
    "jsonschema>=4.0",
    "pyyaml>=6.0",
    "prompt_toolkit>=3.0",   # plain CUI (--cui flag) keeps this
    "ddgs>=8.0",
    "textual>=0.50",         # default TUI mode (PR-cli-2)
]

[project.urls]
# Replace before release: update to real repo URLs
Homepage = "https://github.com/<org>/reyn"
Repository = "https://github.com/<org>/reyn"
Issues = "https://github.com/<org>/reyn/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
    "mypy",
]
docs = [
    "mkdocs>=1.5",
    "mkdocs-material>=9.5",
    "mkdocs-static-i18n>=1.2",
]
web = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "websockets>=12",
]
mcp = ["mcp>=1.0"]

[project.scripts]
reyn = "reyn._cli:main"

[tool.pytest.ini_options]
asyncio_mode = "strict"
pythonpath = ["src"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["reyn*"]

[tool.setuptools.package-data]
"reyn" = ["py.typed", "stdlib/**/*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
