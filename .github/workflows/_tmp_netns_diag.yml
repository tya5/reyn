name: TEMP netns diag 3030

on:
  pull_request:
    branches: ["**"]

jobs:
  netns-diag:
    name: TEMP netns diag (x86_64 ABI7)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[sandbox-linux]"
      - run: python scripts/_tmp_netns_diag_3030.py
