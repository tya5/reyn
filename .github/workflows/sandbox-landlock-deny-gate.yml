name: sandbox Landlock deny gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  landlock-deny-gate:
    # "single ABI" is the load-bearing half of this name: whatever ABI this
    # runner's kernel happens to expose (measured: 7, on 6.17.0-azure) is the
    # ONLY one a green here speaks for. See the script docstring.
    name: Landlock/seccomp deny must fire (single ABI, #2983 stage 3)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # `sandbox-linux` is deliberately OMITTED from test.yml's extras (loading a
      # real default-deny seccomp filter is irrevocable for the process that does
      # it, which is the wrong shape for pytest's shared session). The cost of
      # that correct decision is that the enforcement arms of
      # tests/test_landlock_exec_shim_1344e.py skip in EVERY job we have — and a
      # skip is green. Until this job, the only host that had ever witnessed a
      # Linux deny was one maintainer's colima VM, run by hand. One host is not a
      # gate.
      #
      # `builtin-rag` is ALSO installed here (#3030): the seccomp allowlist now
      # loads unconditionally (previously skipped whenever allow_subprocess was
      # True, the stdio-MCP default), so every such MCP server is now under a
      # default-deny syscall filter for the first time — the #2962 correctness
      # risk (its first live load killed /bin/echo). Installing this extra is
      # what lets tests/test_sandbox_seccomp_network_3030.py's representative-
      # real-MCP-server probes (reyn-rag-chunker / reyn-rag-vector-store) RUN
      # rather than skip on this job.
      - name: Install sandbox-linux + builtin-rag extras
        run: pip install -e ".[dev,sandbox-linux,builtin-rag]"

      # `uvx` (bundled with the `uv` PyPI package) for the third representative
      # server probe below (markitdown-mcp, #3030) — the RAG server with the
      # widest syscall footprint (network fetch on first run via uvx, then a
      # real file parse).
      - name: Install uv (for uvx)
        run: pip install uv

      # The gate. It has no skip path: if Landlock or pyseccomp is missing it
      # exits FATAL rather than passing having observed nothing, because those
      # are precisely the conditions under which the deny arms report nothing
      # while rc stays 0.
      #
      # Deliberately NOT path-filtered, same reasoning as wheel-reachability.yml
      # and the seccomp x86_64 job: an incomplete include-list is itself a
      # false-allow surface. Letting an enforcement regression under an unlisted
      # path merge because this gate silently never ran would reproduce the exact
      # class (#2962 / #2980 / #3020) the gate exists to catch.
      - name: Landlock + seccomp deny gate (probes must fire a real deny)
        run: python scripts/sandbox_landlock_deny_gate.py

      # Supplementary: the enforcement group of the shim tests, which has never
      # run in CI. It is not the gate — the script above is, and it is what
      # cannot skip. This step is safe from the "skip is green" trap for one
      # specific reason: `requires_landlock` skips exactly when
      # `LandlockBackend().available()` is False, which the gate above already
      # FATALs on. So these arms cannot silently skip while the step above is
      # green.
      #
      # Only this file is collected, and nothing in it loads a filter into the
      # pytest process (each arm launches the shim as a subprocess). -rs prints
      # what skipped and why, so "what ran" stays legible rather than being
      # inferred from a pass count.
      - name: Shim enforcement tests (supplementary — the gate above is the gate)
        run: python -m pytest tests/test_landlock_exec_shim_1344e.py -v -rs --timeout=120

      # #3030: the network-deny falsification (the exact allow_subprocess=True
      # condition that used to leak network), the io_uring completeness probe
      # (bounded-by-construction — the exact gap a syscall-name denylist would
      # have missed), and the representative-real-MCP-server completeness group
      # (reyn-rag-chunker / reyn-rag-vector-store / uvx markitdown-mcp) — the
      # ★★ hard gate that an incomplete allowlist does not silently kill a real
      # MCP server (#2962's class). Same `requires_landlock` skip-safety as the
      # step above; -rs so a markitdown-mcp network-reachability skip (this
      # runner's own PyPI egress, orthogonal to allowlist completeness) is
      # visible rather than silently absorbed into a pass count.
      - name: Network-gate + io_uring + representative-MCP-server tests (#3030)
        run: python -m pytest tests/test_sandbox_seccomp_network_3030.py -v -rs --timeout=180
