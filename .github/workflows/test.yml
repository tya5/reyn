name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Install all optional extras the test suite touches:
        #   dev  — pytest + pytest-asyncio + ruff + mypy
        #   mcp  — `fastmcp` (v3.4.2; #2597 S1), used by tests/test_mcp_client.py
        #   web  — fastapi + uvicorn + websockets, used by tests/web/
        #   fs-watch — `watchdog` (#2608 H4), used by tests/test_fs_watcher.py
        #   observability — opentelemetry SDK, used by tests/observability/
        #   builtin-rag — sqlite-vec + apsw + chonkie (FP-0063 P2), used by
        #     tests/test_fp0063_p2_builtin_mcp_rag.py. Load-bearing: that file
        #     `pytest.importorskip`s all three, so WITHOUT this extra the whole
        #     module silently SKIPS and CI goes green having verified nothing.
        run: pip install -e ".[dev,mcp,web,fs-watch,observability,builtin-rag]"

      - name: Run tests
        # --timeout=120: a per-test wall-clock cap (pytest-timeout). Without it a
        # single hung test (e.g. a stuck subprocess/asyncio test under Linux-3.12)
        # hangs the whole -n auto job to the 15-min job timeout → cancel, with no
        # name. The cap interrupts the hung test (signal method on Linux) and
        # NAMES it. Permanent CI hardening (#1800-7 diagnostic).
        run: python -m pytest -q -n auto --timeout=120

  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

  docs:
    name: docs build (strict)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: pip install -e ".[docs]"

      # Mirrors the "Build documentation" step in pages.yml so broken links
      # and missing nav targets fail at PR time, not post-merge on the Pages
      # deploy — which was previously the only place --strict ran (a broken
      # link could pass PR review and then turn the main Pages job red).
      - name: Build docs (strict)
        run: mkdocs build --strict -f .mkdocs/mkdocs.yml

  lock-check:
    name: uv lock --check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      # No existing workflow installs uv (test/lint/docs jobs all use pip),
      # so this uses astral-sh's official setup-uv action — the canonical
      # install path for uv in GitHub Actions.
      #
      # version is pinned (not floating-latest): uv is pre-1.0 and has
      # historically bumped the lockfile format across minor releases. This
      # is a required, merge-blocking gate — an unpinned auto-upgrade of uv
      # could make `uv lock --check` spuriously reject the committed
      # (format-stable) uv.lock and block every unrelated PR. 0.11.28 is the
      # version this gate is currently green against; bump deliberately,
      # together with `[tool.uv].required-version` in pyproject.toml, if
      # uv.lock is ever re-locked with a newer uv.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.28"

      # Fails if uv.lock has drifted from pyproject.toml (#2852: two silent
      # drifts merged with no gate catching them — a fastmcp promotion
      # without re-lock, and a near-miss chainlit-extra removal).
      - name: Check uv.lock is up to date
        run: uv lock --check

  audit:
    name: test-tier audit
    runs-on: ubuntu-latest
    # PR events: audit only changed test files — 0.194s/file vs 5-9min
    # for the full 652-file corpus.  main push: full run is preserved
    # as the invariant safety net.
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          # git diff needs full history to resolve the base SHA on PRs.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # scripts/test_tier_audit.py is stdlib-only (argparse / ast / re
      # / json / pathlib). No pip install needed — keeps the job fast
      # and decoupled from src/ install state.
      - name: Run test-tier audit
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR event: audit only test files changed in this PR.
            # Tier audit is per-file self-contained (Tier declaration /
            # Tier-4 / mock detection are all in-file), so changed-files
            # scope is sufficient.  Full invariant net is preserved on
            # main push below.
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}"...HEAD \
              -- 'tests/**.py')
            if [ -z "$CHANGED" ]; then
              echo "No test files changed — audit skipped."
              exit 0
            fi
            echo "Auditing changed test files:"
            echo "$CHANGED"
            # shellcheck disable=SC2086
            python scripts/test_tier_audit.py --strict $CHANGED
          else
            # push to main (or any non-PR trigger): full audit over the
            # entire test suite — invariant safety net, unchanged.
            python scripts/test_tier_audit.py --strict tests/
          fi

      # scripts/verify_module_docstrings.py is stdlib-only. PR events: scoped
      # to changed src files (fast). main push: full-tree run — the
      # regress-proof invariant net, now that the tree is clean (#1802). Blocks
      # moved-module refactor-narrative docstrings (the C-series discipline).
      - name: Run module-docstring narrative check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}"...HEAD \
              -- 'src/**.py')
            if [ -z "$CHANGED" ]; then
              echo "No src files changed — docstring check skipped."
              exit 0
            fi
            echo "Checking changed src files:"
            echo "$CHANGED"
            # shellcheck disable=SC2086
            python scripts/verify_module_docstrings.py $CHANGED
          else
            # push to main (or any non-PR trigger): full-tree gate.
            python scripts/verify_module_docstrings.py src/reyn
          fi
