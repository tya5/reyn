name: wheel reachability

on:
  push:
    branches: [main]
  pull_request:

jobs:
  wheel-reachability:
    name: dev==wheel repo self-access parity (0061 §3.4)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      # scripts/wheel_reachability_smoke.py builds a REAL wheel (Hatchling,
      # 0061 §3.1) and installs ONLY that wheel (no -e, no dev checkout) into
      # a throwaway venv, then: (1) checks wheel config completeness
      # (py.typed / builtin/** / environment/*.Dockerfile / _bundled/ tree),
      # (2) reads README/docs/source through reyn_repo's dual-mode resolver
      # and asserts byte-identity with the dev checkout, (3) asserts a
      # non-declared path is refused, (4) re-checks the still-LIVE
      # read_builtin_body_bytes path (#2913, untouched by 0061), (5) starts a
      # builtin RAG MCP server through the `reyn-rag-chunker` console script
      # the wheel ships, from a PATH shaped like a `pipx install reyn`
      # environment (ambient `python3` cannot import reyn), and calls a real
      # tool on it -- #2972. This is deliberately NOT path-filtered: a
      # positive include-list is itself a false-allow surface — an incomplete
      # list lets a packaging regression under an unlisted path merge with the
      # gate silently never running. Cost is ~1 minute end-to-end (checks 1-4
      # install the wheel with no dependencies and stay a few seconds; check 5
      # needs a second venv with `[builtin-rag]` because an MCP server must
      # really import fastmcp/chonkie to serve a call) — trivial next to the
      # severity of a production wheel silently shipping a broken/incomplete
      # repo-access surface with zero CI signal, so this runs unconditionally
      # on every PR instead of trying to enumerate "every packaging-affecting
      # path".
      - name: Install build tooling
        run: pip install build

      - name: Wheel reachability parity gate
        run: python scripts/wheel_reachability_smoke.py
