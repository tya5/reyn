name: Bug report
description: Report a defect in Reyn (OS, op runtime, stdlib skill, CLI, or web UI).
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the
        sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        What happened, what you expected, and a minimal reproduction.
        A small skill / phase definition that triggers the bug is much more
        useful than a prose description alone.
      placeholder: |
        What happened:
        ...

        What I expected:
        ...

        Minimal repro (commands, skill snippet, input):
        ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please include:
        - Python version (`python --version`)
        - OS and version
        - Reyn version (`reyn --version`, or `pip show reyn`)
        - LiteLLM model / provider used (e.g. `gemini/gemini-2.5-flash-lite`)
      placeholder: |
        Python: 3.12.4
        OS: macOS 14.5 / Ubuntu 24.04 / ...
        Reyn: 0.1.0a1
        Model: gemini/gemini-2.5-flash-lite via LiteLLM proxy at localhost:4000
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / events
      description: |
        Stack trace, CLI output, or relevant excerpt from the run's
        `.reyn/events/` log. Please mention the workspace path if you can
        share it. Redact API keys and any private data before posting.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest `main` branch.
          required: true
        - label: I have redacted secrets, API keys, and private data from the report.
          required: true
