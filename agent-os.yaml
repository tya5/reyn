# AgentOS project configuration
# Committed to git. For personal overrides, use agent-os.local.yaml (gitignored).
# api_base (proxy URL) belongs in agent-os.local.yaml or ~/.agent-os/config.yaml.
# API keys must be set as environment variables — never in config files:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, etc.

# Default model class when --model is not specified
model: standard

# Model class → LiteLLM model string
# Three standard tiers. Add custom classes as needed.
models:
  light:    openai/gemini-2.5-flash-lite
  standard: openai/gemini-2.5-flash-lite
  strong:   openai/gemini-2.5-flash-lite
