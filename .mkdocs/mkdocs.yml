site_name: Reyn
site_description: LLM workflow OS — phase transitions as a constrained decision graph
site_url: https://tya5.github.io/reyn/
docs_dir: ../docs
# Build output to repo-root site/ (config now lives in .mkdocs/, so make the
# output dir explicit rather than relying on the default .mkdocs/site/).
site_dir: ../site

# Show a GitHub icon in the top-right of the docs header that links back
# to the source repository. mkdocs-material renders this automatically
# when both repo_url and repo_name are set.
repo_url: https://github.com/tya5/reyn
repo_name: tya5/reyn
edit_uri: edit/main/docs/

# Files / directories tracked in git for development reference but NOT
# published to the static site. Patterns are gitignore-style, relative to
# docs_dir.  Add an entry here when you want to keep working notes in the
# repo without exposing them on the public docs site.
exclude_docs: |
  # Internal documentation — moved out of public site (P1-P3 restructure).
  # Single subtree captures journal / research / spec / decisions /
  # contributing (= maintainer / design history).
  deep-dives/
  # Cookbook: render the example READMEs (first-class Cookbook section), but
  # exclude the runnable skill *source* dirs (skill.md + phases) — those are
  # executable examples, not doc pages.
  cookbook/improve-a-skill/sample_skill/
  cookbook/translate-doc/translate_doc/

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.indexes
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate
  font: false
  logo: assets/reyn-mark-white.png
  palette:
    scheme: default
    primary: custom

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

