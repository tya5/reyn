      - how-to/add-a-python-preprocessor.md
      - how-to/ask-user-mid-phase.md
      - how-to/manage-permissions.md
      - how-to/debug-with-events.md
      - how-to/persist-state.md
      - how-to/localize-output.md
      - how-to/import-an-existing-skill.md
      - how-to/build-an-agent-team.md
