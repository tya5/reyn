site_name: Reyn
site_description: LLM workflow OS — phase transitions as a constrained decision graph
site_url: https://tya5.github.io/reyn/docs/
docs_dir: docs

# Show a GitHub icon in the top-right of the docs header that links back
# to the source repository. mkdocs-material renders this automatically
# when both repo_url and repo_name are set.
repo_url: https://github.com/tya5/reyn
repo_name: tya5/reyn
edit_uri: edit/main/docs/

# Files / directories tracked in git for development reference but NOT
# published to the static site. Patterns are gitignore-style, relative to
# docs_dir.  Add an entry here when you want to keep working notes in the
# repo without exposing them on the public docs site.
exclude_docs: |
  # Engineering journals — dogfood batch logs, feature-verify notes
  deep-dives/journal/

  # Internal research notes — competitive analysis / positioning /
  # strategic priorities / doc improvement proposals. Not user-facing
  # OSS docs (= same category as journal/).
  deep-dives/research/

  # OpenUI = internal contract for Reyn's web UI. Not yet a neutral
  # multi-vendor protocol (see docs/deep-dives/spec/openui/README.md framing).
  deep-dives/spec/openui/

  # Web mode design / handoff docs. User-facing pieces live under
  # en/guide/for-skill-authors/author-a-design.md; the rest is internal
  # contract.
  deep-dives/spec/design/

  # CLI redesign draft — tracked for design history, not policy.
  contributing/cli-redesign.md

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate
  font: false
  logo: assets/reyn-mark-white.png
  palette:
    scheme: default
    primary: custom

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

