name: scan_plan
description: |
  LLM-decided plan for the index_events scan phase.

  The LLM decides the effective lower-bound timestamp, confirms the
  indexing mode, and echoes the preprocessor-resolved inventory summary.
  The postprocessor re-globs event files deterministically at run time
  using `since` — it does NOT rely on the LLM to supply file paths.

  `since` is resolved from skill input or the cursor file before the LLM
  sees it (via preprocessor); the LLM echoes it back in the artifact.
schema:
  type: object
  required: [since, mode]
  properties:
    since:
      type: string
      description: |
        Effective lower-bound ISO-8601 timestamp. Only events whose
        completed_at is >= since will be indexed. Epoch ("1970-01-01T00:00:00Z")
        means "index everything" (cursor absent or mode=replace).
    event_files_count:
      type: integer
      minimum: 0
      description: |
        Number of candidate .jsonl event files discovered by the preprocessor.
        Informational only — the postprocessor re-globs files independently.
    oldest_timestamp:
      type: [string, "null"]
      description: |
        Approximate timestamp of the oldest event file (by mtime). Null if no
        files were found.
    newest_timestamp:
      type: [string, "null"]
      description: |
        Approximate timestamp of the newest event file (by mtime). Null if no
        files were found.
    skill_filter:
      type: [array, "null"]
      items:
        type: string
      default: null
      description: |
        Restrict indexing to runs from these skill names only. null = all skills.
    mode:
      type: string
      enum: [append, replace]
      default: append
      description: |
        append = only index runs not already indexed (default).
        replace = clear the events source and rebuild from scratch.
