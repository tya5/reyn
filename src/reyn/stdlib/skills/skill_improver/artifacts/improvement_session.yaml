name: improvement_session
description: Configuration carried through every iteration of an improver run — target skill name, iteration limits, termination thresholds, and the eval criteria for the chosen test case.
schema:
  type: object
  properties:
    target_skill:
      type: string
      description: Short skill name only (e.g. "direct_llm"). Path resolution is OS responsibility via resolve_skill_path. LLM must NOT construct path strings.
    case_name:
      type: string
      description: Name of the test case from the eval spec to use for every iteration.
    case_input:
      type: string
      description: Input string passed to the target skill each iteration. Mirrors the case_input field in the eval spec.
    phase_criteria:
      type: array
      description: Per-phase quality criteria extracted from the chosen eval case. Forwarded to the eval sub-skill on every iteration.
      items:
        type: object
        properties:
          phase_name:
            type: string
            description: Name of a phase to evaluate.
          criteria:
            type: array
            description: List of quality criteria for this phase.
            items:
              type: object
              properties:
                description:
                  type: string
                  description: The criterion text.
                required:
                  type: boolean
                  description: True if failing this criterion means the phase fails overall.
              required: [description, required]
        required: [phase_name, criteria]
    model:
      type: string
      description: LiteLLM model class or string used for the target skill's runs (e.g. "standard").
    max_iterations:
      type: integer
      minimum: 1
      maximum: 10
      description: Hard cap on the number of run-eval-improve iterations. Loop terminates when this count is reached.
    score_threshold:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Minimum eval score that signals success. Loop terminates early once latest_eval.overall_score >= this value.
    improvement_focus:
      type: string
      description: Optional area to focus improvements on, e.g. "instruction clarity". Empty string when not specified.
    _resolved_paths:
      type: object
      description: OS-resolved path fields injected by the copy_to_work preprocessor and carried verbatim through every subsequent phase. LLM MUST NOT construct these values — copy them as-is from the preprocessor output.
      properties:
        target_skill_path:
          type: string
          description: CWD-relative path to the work-copy skill.md (e.g. ".reyn/skill_improver_work/direct_llm/skill.md"). Used by run_and_eval as eval_case_input.target_skill_path.
        target_skill_root:
          type: string
          description: CWD-relative path to the work directory root (e.g. ".reyn/skill_improver_work/direct_llm"). Used by plan_improvements to glob DSL files.
        eval_spec_path:
          type: string
          description: Path to the eval.md spec (in the ORIGINAL skill directory, not the work copy).
        original_skill_root:
          type: string
          description: Path to the original skill directory. Used by finalize for copy-back.
      required: [target_skill_path, target_skill_root, eval_spec_path, original_skill_root]
  required:
    - target_skill
    - case_name
    - case_input
    - phase_criteria
    - model
    - max_iterations
    - score_threshold
    - improvement_focus
    - _resolved_paths
