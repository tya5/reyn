name: read_plan
description: |
  Plan emitted by the `decide_files` phase: the list of paths to fetch
  via the filesystem MCP server, plus a one-line reason that the LLM in
  `read_and_respond` can use to focus its synthesis.
schema:
  type: object
  properties:
    paths:
      type: array
      description: |
        Project-relative paths to read. Each entry is passed verbatim to
        the filesystem MCP server's `read_text_file` tool. The server
        itself enforces which paths are accessible — if a path is outside
        the server's configured root, the MCP call returns
        `status: error`.
      items:
        type: string
      minItems: 1
    reason:
      type: string
      description: |
        One-sentence rationale for picking these paths. Used by
        `read_and_respond` to keep the final synthesis focused on the
        user's intent.
  required: [paths, reason]
