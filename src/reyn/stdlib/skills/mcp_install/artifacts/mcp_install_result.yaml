name: mcp_install_result
description: Result of an MCP server installation attempt via the mcp_install op.
schema:
  type: object
  properties:
    status:
      type: string
      description: "installed | error | skipped"
    server_id:
      type: string
      description: Registry identifier of the server (e.g. "io.github.foo/bar-mcp").
    server_name:
      type: string
      description: Short config key written to mcp.servers.<name> (e.g. "bar-mcp").
    scope:
      type: string
      description: "Scope tier used: local | project | user"
    installed_path:
      type: string
      description: Absolute path of the config file that was modified.
    message:
      type: string
      description: Human-readable summary or error message.
  required: [status, server_id]
