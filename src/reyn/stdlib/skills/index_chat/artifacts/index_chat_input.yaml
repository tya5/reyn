name: index_chat_input
description: |
  Input for the index_chat skill.

  Specifies an optional lower-bound timestamp (since). If since is null,
  the cursor file .reyn/index/chat_cursor is read by the preprocessor to
  determine the effective lower bound.
schema:
  type: object
  properties:
    since:
      type: [string, "null"]
      default: null
      description: |
        ISO-8601 timestamp lower bound (inclusive). null = read from chat
        cursor file.  If cursor file is absent, defaults to Unix epoch
        (index everything).
    mode:
      type: string
      enum: [append, replace]
      default: append
      description: |
        append = incremental (default). replace = full reindex (ignores cursor).
