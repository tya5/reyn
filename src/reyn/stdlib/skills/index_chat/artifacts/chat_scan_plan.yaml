name: chat_scan_plan
description: |
  LLM-decided plan for the index_chat scan phase.

  The LLM echoes the preprocessor-resolved inventory summary.
  The postprocessor re-globs chat files deterministically at run time
  using `since` — it does NOT rely on the LLM to supply file paths.
schema:
  type: object
  required: [since, mode]
  properties:
    since:
      type: string
      description: |
        Effective lower-bound ISO-8601 timestamp. Only user turns whose
        timestamp is >= since will be indexed. Epoch ("1970-01-01T00:00:00Z")
        means "index everything" (cursor absent or mode=replace).
    chat_files_count:
      type: integer
      minimum: 0
      description: |
        Number of candidate .jsonl chat files discovered by the preprocessor.
        Informational only — the postprocessor re-globs files independently.
    oldest_timestamp:
      type: [string, "null"]
      description: |
        Approximate timestamp of the oldest chat file (by mtime). Null if
        no files were found.
    newest_timestamp:
      type: [string, "null"]
      description: |
        Approximate timestamp of the newest chat file (by mtime). Null if
        no files were found.
    mode:
      type: string
      enum: [append, replace]
      default: append
      description: |
        append = only index turns not already indexed (default).
        replace = clear the chat source and rebuild from scratch.
