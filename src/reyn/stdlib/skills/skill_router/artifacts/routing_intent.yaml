name: routing_intent
description: |
  Triage result. Carries the chosen bucket intent plus the dispatch-relevant
  context (user_message, history, available_skills, memory_index) so the
  next phase (match or reply) can act without re-reading state.

  PR34: triage emits this for every utterance; the bucket determines the
  next phase via the skill graph (chitchat / direct_reply → reply,
  task / fresh_lookup → match → maybe web_research).
schema:
  type: object
  properties:
    intent:
      type: string
      description: |
        Triage bucket. Determines the next phase:
        - "chitchat"     → reply (greeting / thanks / ack / casual social)
        - "task"         → match (skill / agent dispatch)
        - "fresh_lookup" → match → web_research (current / time-sensitive data)
        - "direct_reply" → reply (memory recall / stable knowledge / clarification)
      enum: [chitchat, task, fresh_lookup, direct_reply]
    confidence:
      type: number
      description: |
        Self-assessed confidence 0.0-1.0. The match phase may ask a
        clarifying question instead of dispatching when confidence is low.
    rationale:
      type: string
      description: |
        One-sentence reason for the classification. For fresh_lookup, name
        the freshness signal (e.g. "user mentions '最新'"). For task,
        name the matching skill or capability hint. Used for audit and
        downstream dispatch.
    user_message:
      type: string
      description: |
        Pass-through of the original user utterance. The match phase uses
        this verbatim when constructing skill inputs or web_research queries.
    history:
      type: array
      description: |
        Pass-through of the sliced history from classify's preprocessor.
        Used by match when transitioning to web_research so the researcher
        inherits tone context.
      items:
        type: object
        properties:
          role: {type: string}
          text: {type: string}
        required: [role, text]
    available_skills:
      type: array
      description: |
        Pass-through of the skill catalogue with routing metadata. The match
        phase consults each entry's `routing` block (when present) to pick
        the best skill for `task` intent. Trust source for OS validators
        is `skill_input.data.available_skills` (PR33), not this field — the
        triage LLM can in principle fabricate this list.
      items:
        type: object
        properties:
          name: {type: string}
          description: {type: string}
          routing:
            type: object
            description: Optional opt-in routing metadata (intents, when_to_use, examples, ...).
        required: [name, description]
    memory_index:
      type: object
      description: |
        Pass-through of the merged memory index from the skill input. The
        reply phase reads this to answer memory_recall queries without
        re-fetching.
  required: [intent, confidence, rationale, user_message]
