name: skill_plan
description: Skill plan with artifact schemas, produced by design_artifacts and validated by review_plan before build_skill generates DSL files.
schema:
  type: object
  description: Structured plan produced by plan_skill, consumed by build_skill to generate DSL files.
  properties:
    skill_name:
      type: string
      description: snake_case name for the new skill.
    skill_description:
      type: string
      description: One sentence describing what the skill does for its users.
    skill_path:
      type: string
      description: Workspace-relative directory where DSL files will be written, e.g. "reyn/local/my_app".
    entry_phase:
      type: string
      description: Name of the first phase to execute when the skill is run.
    finish_criteria:
      type: array
      items:
        type: string
      description: 2-4 conditions that must be true for the workflow to be considered complete.
    phases:
      type: array
      description: All phases in the skill, including entry and can_finish phases.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case phase name.
          role:
            type: string
            description: LLM role persona, e.g. "writer", "reviewer", "analyst".
          model_class:
            type: string
            enum: [light, standard, strong]
            description: "light: simple/deterministic tasks; standard: most phases; strong: complex reasoning."
          input_artifact:
            type: string
            description: Name of the artifact this phase receives as input.
          instructions:
            type: string
            description: 2-4 sentence domain-logic instructions for this phase's task.
          can_finish:
            type: boolean
            description: True if this phase may end the workflow by choosing decision=finish.
          allowed_ops:
            type: array
            items:
              type: string
            description: |
              Control IR op kinds this phase may emit. Pick the smallest set
              from `op_catalog` that the phase actually needs — narrower lists
              prevent the LLM from drifting outside the phase's intent and
              reduce prompt tokens. Common patterns: [file] for read/write
              phases, [file, ask_user] (the implicit default) for interactive
              phases, [run_skill] for orchestrator phases, [] for pure
              decision phases that emit no side effects (e.g. routing,
              judging). Omit the field to inherit the default [file, ask_user].
          preprocessor:
            type: array
            description: |
              Optional deterministic steps that enrich the input artifact BEFORE
              the LLM is called. Each step's output is placed at its `into` path
              and visible to the LLM as part of the enriched artifact. Use for
              tasks the LLM is unreliable at (counting, parsing, format
              conversion, regex extraction, numeric work).
            items:
              type: object
              properties:
                type:
                  type: string
                  enum: [python]
                  description: |
                    Step type. Only "python" is generated by skill_builder; other
                    types (validate / run_skill / iterate / lint_plan) can be
                    added by hand if needed.
                module:
                  type: string
                  description: |
                    Skill-dir-relative path to the .py file, e.g. "./preprocessing.py".
                    The file's source must appear in the skill_plan's top-level
                    `python_modules` array.
                function:
                  type: string
                  description: |
                    Function name within the module. Signature
                    `(artifact: dict) -> JSON-serializable`.
                into:
                  type: string
                  description: |
                    Dot path inside the artifact where the function's return
                    value is placed (e.g. "data.stats").
                output_schema:
                  type: object
                  description: |
                    JSON Schema for the function's return value. The LLM sees
                    the enriched artifact with this schema; the runtime
                    validates the actual return against it.
                mode:
                  type: string
                  enum: [pure, trusted]
                  description: |
                    "pure" (default): AST + restricted-builtins sandbox; user
                    code can only import the stdlib allowlist + reyn.yaml's
                    python.allowed_modules. "trusted": no sandbox; requires
                    --allow-untrusted-python at runtime. Default to "pure"
                    unless the user explicitly needs unrestricted access.
                timeout:
                  type: integer
                  description: Wall-clock seconds before the subprocess is killed. Default 30.
              required: [type, module, function, into, output_schema]
        required: [name, role, input_artifact, instructions]
    transitions:
      type: array
      description: Graph edges defining which phases can follow each phase.
      items:
        type: object
        properties:
          from:
            type: string
            description: Source phase name.
          to:
            type: array
            items:
              type: string
            description: Target phase names. Must contain only phase names, never artifact names.
        required: [from, to]
    artifacts:
      type: array
      description: All artifact definitions needed by the skill's phases.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case artifact name matching a phase's input_artifact.
          description:
            type: string
            description: One sentence describing what this artifact contains and its purpose.
          schema:
            type: object
            description: JSON Schema object for the artifact's data fields. Must have type=object with properties and required.
        required: [name, description, schema]
    final_output:
      type: object
      description: The artifact delivered to the user when the workflow finishes.
      properties:
        name:
          type: string
          description: snake_case name for the final output artifact.
        description:
          type: string
          description: One sentence describing what the final output contains.
        schema:
          type: object
          description: JSON Schema object for the final output's data fields.
      required: [name, description, schema]
    max_iterations:
      type: integer
      description: |
        Iteration cap copied through from the input skill_request (=
        plumbed for the post-lint ``iterate_with_evals`` phase). 0 = no
        iteration requested. Default 0 keeps the legacy
        build → lint → finish behaviour.
      default: 0
      minimum: 0
    score_threshold:
      type: number
      description: |
        Score threshold copied through from input. Only meaningful when
        ``max_iterations`` > 0.
      default: 0.85
      minimum: 0.0
      maximum: 1.0
    routing:
      type: object
      description: |
        Structured routing hints the chat router uses alongside the bare
        `description` to decide WHEN to dispatch this skill. Mirrors the
        structure used by every stdlib skill — populating it puts new
        user-built skills on the same triggering footing as the built-ins.
        All sub-fields are required even if some are empty lists. Missing
        routing leaves the router with only `description` to match against,
        which is the under-triggering trap PR #564 / #567 already partially
        address at the description layer.
      properties:
        intents:
          type: array
          description: |
            Intent kinds the router associates with this skill. Almost
            always [task] for action-oriented skills. Use
            [stable_knowledge] only for Q&A skills that answer factual
            questions about a fixed domain (rare for user-built skills).
          items:
            type: string
            enum: [task, stable_knowledge]
        when_to_use:
          type: array
          description: |
            Concrete trigger scenarios — third-person phrases the router
            matches against the user's turn semantics. 2-5 entries.
            Examples: "User wants to build a dashboard", "User mentions
            data visualization". Should overlap with the synonyms in
            `skill_description` but written as scenario descriptions
            rather than imperative trigger phrases.
          items:
            type: string
        when_not_to_use:
          type: array
          description: |
            Anti-trigger scenarios — when the router should pick a
            different skill or answer inline instead. 1-3 entries.
            Examples: "User wants the conceptual explanation (= stable
            knowledge)", "User wants to test the skill (= use eval)".
            Include cross-references to sibling skills the request might
            be confused with.
          items:
            type: string
        examples:
          type: object
          description: Verbatim example user phrasings, positive + negative.
          properties:
            positive:
              type: array
              description: |
                User phrasings that SHOULD trigger this skill. 2-3 examples,
                in the user's actual language (ja / en mixed is fine).
                Quote-shaped strings, not paraphrased descriptions.
              items:
                type: string
            negative:
              type: array
              description: |
                User phrasings that should NOT trigger this skill (= might
                look similar but belong to a sibling skill). 1-2 examples.
                Comment in parentheses naming the actual target skill.
              items:
                type: string
          required: [positive, negative]
      required: [intents, when_to_use, when_not_to_use, examples]
    mcp_servers:
      type: array
      description: MCP servers recommended for this skill (empty if none needed).
      items:
        type: object
        properties:
          name:
            type: string
            description: MCP server name as listed in the registry.
          purpose:
            type: string
            description: One sentence on how this server helps the skill.
          url:
            type: string
            description: Repository or homepage URL of the server.
        required: [name, purpose]
    python_modules:
      type: array
      description: |
        Python source files to write under the skill directory. Each entry's
        `path` is referenced from a phase's preprocessor step `module` field.
        Empty if the skill uses no python preprocessor steps.
      items:
        type: object
        properties:
          path:
            type: string
            description: |
              Skill-dir-relative path, e.g. "./preprocessing.py". MUST match
              what some phase's preprocessor step references via `module`.
          source:
            type: string
            description: |
              Full Python source code. Must define every function referenced
              in matching preprocessor steps. Sandboxing constraints (pure
              vs trusted) apply per-step, not per-module.
        required: [path, source]
  required: [skill_name, skill_description, skill_path, entry_phase, finish_criteria, phases, transitions, artifacts, final_output, routing, mcp_servers, python_modules]
