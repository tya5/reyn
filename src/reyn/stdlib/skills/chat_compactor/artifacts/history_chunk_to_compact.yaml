name: history_chunk_to_compact
description: |
  Input to the chat_compactor skill: a chunk of recent chat turns to fold
  into the rolling BODY summary, plus the previous summary (if any) for
  continuity.
schema:
  type: object
  properties:
    previous_summary:
      type: object
      description: |
        The current rolling BODY summary if one exists; null otherwise.
        The compactor folds new_turns into this and outputs an updated
        summary that stays within section_token_caps.
      properties:
        topic_arc: {type: string}
        decisions: {type: array, items: {type: string}}
        pending: {type: array, items: {type: string}}
        session_user_facts: {type: array, items: {type: string}}
        artifacts_referenced: {type: array, items: {type: string}}
        covers_through_seq: {type: integer}
    new_turns:
      type: array
      description: |
        Recent user/agent turns to absorb into the BODY summary, oldest first.
      items:
        type: object
        properties:
          role: {type: string, description: '"user" or "agent"'}
          text: {type: string}
          seq: {type: integer, description: monotonic turn id from history.jsonl}
        required: [role, text, seq]
    section_token_caps:
      type: object
      description: |
        Per-section token budgets the compactor must respect. Total across
        sections should stay under body_token_cap.
      properties:
        topic_arc: {type: integer}
        decisions: {type: integer}
        pending: {type: integer}
        session_user_facts: {type: integer}
        artifacts_referenced: {type: integer}
  required: [new_turns, section_token_caps]
