# Builtin RAG -- ingest pipeline (FP-0063 P3).
# docs/deep-dives/proposals/0063-builtin-turnkey-user-rag.md
#
# Reads a file or a folder, converts each document to Markdown (the
# `markitdown` MCP server), chunks it (the `chunker` MCP server), embeds
# only the NEW/CHANGED chunks (reyn's own `embed` tool -- C1: reyn is the
# SOLE embedder), and upserts them into a user-named sqlite vector store
# (the `vectorstore` MCP server) -- FP-0057 C2: the store is external, reyn
# hosts none of it.
#
# This file IS the extension mechanism (R2): copy it and re-point the
# `*_server` inputs (or the MCP config entries they name) at a different
# backend. Every tunable is a `ctx.*` INPUT with a sane default, never a
# constant baked into a step (R4).
#
# This pipeline runs NO python of its own. It calls MCP tools and reyn's
# own ops -- nothing else. reyn does not own the operator's python runtime
# and must not assume one, so the four things the R1 expression language
# cannot express each live with the party that already holds the relevant
# data: `glob_files` (reyn's own op) walks the folder, the chunker returns
# each chunk's own content_hash/chunk_index/est_tokens, and the vector
# store pairs items with vectors by index inside `upsert`.
#
# Preparing the MCP servers' runtime is the OPERATOR's responsibility --
# reyn ships their code in the wheel and launches whatever `command` the
# config names, in any language. See
# docs/cookbook/configs/with-builtin-rag-mcp.yaml for the recommended
# console-script form (it works under pipx; `python -m ...` depends on the
# ambient interpreter and can fail).
#
# Inputs (all optional except `input_path`/`output_db`):
#   input_path          -- (required) an ABSOLUTE path to a document file
#                          OR a folder of them. Absolute because the file
#                          discovery below globs it directly: an absolute
#                          pattern yields absolute source paths (which is
#                          what `file://` conversion and the stored
#                          source_path column both need).
#   output_db           -- (required) the sqlite file to write into.
#   file_extensions     -- extensions to ingest when input_path is a folder
#                          (default: the proposal-0063 target formats
#                          txt/md/pdf/xlsx/pptx/docx). Written as glob
#                          character classes so the match is
#                          case-insensitive (`[pP][dD][fF]` also finds
#                          `.PDF`) on case-sensitive filesystems too.
#   max_files           -- cap on files discovered per extension (default
#                          10000). Passed EXPLICITLY to every glob_files
#                          call: that op's own default is 50, and a folder
#                          with more files than the cap is truncated
#                          SILENTLY (no error) -- #2994. Left implicit,
#                          document 51+ of a real corpus would vanish from
#                          the index with nothing in the summary to say so.
#   chunk_size          -- chunker token size (default 400 -- the 2026
#                          256-512-token persistent-RAG band, NOT FP-0057's
#                          800-1024 (that number is for throwaway ephemeral
#                          attachments -- a different case, R4)).
#   chunk_overlap_ratio -- chunker overlap fraction (default 0.125 = 12.5%,
#                          within the 10-15% 2026 default band).
#   embedding_model     -- passed to reyn's `embed` tool (default
#                          "standard"). This may be a model-CLASS alias;
#                          what gets STAMPED onto each chunk's
#                          `embedding_model` column (C4) is the model the
#                          provider actually RESOLVED, read back from
#                          `embed`'s own envelope meta -- so the column can
#                          never disagree with the vectors beside it.
#   filter_none_conversions -- treat a conversion whose ENTIRE output is the
#                          literal string "None" as a failed conversion
#                          (default true). markitdown manufactures that
#                          string from an undecodable file and reports
#                          SUCCESS -- see the long note at the gate in
#                          _ingest_one_file for the measured chain and the
#                          upstream line responsible. Exact equality only, so
#                          a document merely mentioning None is unaffected;
#                          set false if a document's real content IS "None"
#                          (a .txt of exactly that is content, not a bug, and
#                          this pipeline cannot tell the two apart).
#   markitdown_server / chunker_server / vectorstore_server -- the MCP
#                          server names as configured under `mcp.servers`
#                          (defaults: reyn_markitdown / reyn_chunker /
#                          reyn_vector_store -- see
#                          docs/cookbook/configs/with-builtin-rag-mcp.yaml).
#
# Output: `ctx.result` -- either `_ingest_body`'s summary (files/chunks
# added/updated/removed/unchanged, the resolved `embedding_model`, and the
# X2a METERED spend for this batch: `tokens_embedded` / `cost_usd` /
# `priced`, read from `embed`'s own envelope meta -- plus X5's
# `estimated_tokens_saved_by_dedup`, the one necessarily-estimated figure,
# and #3010's `files_skipped` / `skipped_files` naming every discovered file
# that produced NO indexed content -- whether its conversion failed, it
# reported an empty body, or it simply chunked to zero -- each with the
# reason, so a file can never leave the corpus silently)
# or `_blocked`'s X1 pre-flight failure message (cause + concrete remedy
# per unreachable server -- mirrors #2932's `require_mcp` decision-enabling
# error, never a bare transport exception).
schema: PreflightCheck
fields:
  status: {type: enum, values: ["ok"]}
---
pipeline: ingest
description: >-
  FP-0063 P3 builtin RAG ingest: chunk -> embed -> store a file or folder
  into a user-named sqlite vector store, incrementally by content_hash
  (add/update/remove). Pre-flights its 3 MCP servers before any embedding
  spend (X1); reports spend AFTER the dedup skip (X2a/X5). Runs no python
  of its own -- MCP tools and reyn ops only (#2972).
steps:
  # ---- inputs-with-defaults (R4: never a constant baked into a step) ----
  - transform: {value: "get(ctx, 'chunk_size', 400)", output: chunk_size}
  - transform: {value: "get(ctx, 'chunk_overlap_ratio', 0.125)", output: chunk_overlap_ratio}
  - transform: {value: "get(ctx, 'embedding_model', 'standard')", output: embedding_model}
  - transform: {value: "get(ctx, 'markitdown_server', 'reyn_markitdown')", output: markitdown_server}
  - transform: {value: "get(ctx, 'chunker_server', 'reyn_chunker')", output: chunker_server}
  - transform: {value: "get(ctx, 'vectorstore_server', 'reyn_vector_store')", output: vectorstore_server}
  - transform:
      value: >-
        get(ctx, 'file_extensions', ['[tT][xX][tT]', '[mM][dD]', '[pP][dD][fF]',
                                     '[xX][lL][sS][xX]', '[pP][pP][tT][xX]', '[dD][oO][cC][xX]'])
      output: file_extensions
  - transform: {value: "get(ctx, 'max_files', 10000)", output: max_files}
  - transform:
      value: "get(ctx, 'filter_none_conversions', true)"
      output: filter_none_conversions

  # ---- X1: pre-flight -- a REAL probe call per server (not just "is it
  # configured"), schema-gated to status=="ok" so an MCP-layer error
  # (unconfigured server / permission-denied / transport fault / a raised
  # ImportError inside the server itself -- e.g. "No module named 'apsw'")
  # fails that ONE branch without aborting the others (`parallel`'s
  # `on_error: continue` -- a dropped branch's key is simply absent from
  # `collect`'s named map, so we know WHICH server failed by name, with no
  # need to parse the underlying transport error text). ----
  - transform:
      value: >-
        {markitdown: "MarkItDown MCP server '" + ctx.markitdown_server + "' is unreachable. (1) it is probably not installed yet -- builtin MCP configs ship INERT by design, so install it yourself and the operator is prompted at the permission gate: mcp__install_local(name=\"" + ctx.markitdown_server + "\", command=\"uvx\", args=[\"markitdown-mcp\"]). Do not ask the operator to hand-edit YAML, and do not add a permissions block -- a configured server is granted when this pipeline runs it. (2) if the install itself fails, uvx could not fetch markitdown-mcp from PyPI on first run (e.g. a firewalled network) -- install it into its OWN isolated venv (never reyn's) and point command at that absolute path: python3 -m venv ~/.reyn-markitdown && ~/.reyn-markitdown/bin/pip install markitdown-mcp, then command=\"~/.reyn-markitdown/bin/markitdown-mcp\" (absolute).",
         chunker: "Chunker MCP server '" + ctx.chunker_server + "' is unreachable. (1) it is probably not installed yet -- install it yourself and the operator is prompted at the permission gate: mcp__install_local(name=\"" + ctx.chunker_server + "\", command=\"reyn-rag-chunker\", args=[]). Do not ask the operator to hand-edit YAML, and do not add a permissions block. The `reyn-rag-chunker` console script is the recommended command (its shebang points at reyn's own interpreter, so it works under pipx, unlike `python -m ...` which depends on the ambient python). (2) if the install fails its pre-install probe, the runtime is missing -- that is the operator's machine to fix: pip install \"reyn[builtin-rag]\" (chonkie). reyn launches whatever the config names and does not prepare the runtime for you.",
         vectorstore: "Vector-store MCP server '" + ctx.vectorstore_server + "' is unreachable. (1) it is probably not installed yet -- install it yourself and the operator is prompted at the permission gate: mcp__install_local(name=\"" + ctx.vectorstore_server + "\", command=\"reyn-rag-vector-store\", args=[]). Do not ask the operator to hand-edit YAML, and do not add a permissions block. The `reyn-rag-vector-store` console script is the recommended command (its shebang points at reyn's own interpreter, so it works under pipx, unlike `python -m ...` which depends on the ambient python). (2) if the install fails its pre-install probe, the runtime is missing -- that is the operator's machine to fix: pip install \"reyn[builtin-rag]\" (apsw + sqlite-vec). reyn launches whatever the config names and does not prepare the runtime for you."}
      output: remedies

  # X1 pre-flight is now PURELY MCP reachability (#2972). It used to also
  # probe "can the ambient python3 import reyn?" -- a question that only
  # existed because this pipeline shelled out to python, i.e. it was reyn
  # checking an assumption reyn had no business making. With the shell-outs
  # gone, the only prerequisite left is the one the operator actually owns:
  # are the MCP servers they configured reachable? That is the #2932
  # `require_mcp` shape -- a real probe call per server, answered with cause
  # + concrete remedies the operator can act on.
  - parallel:
      on_error: continue
      branches:
        markitdown:
          tool:
            name: call_mcp_tool
            schema: PreflightCheck
            args:
              server: !expr ctx.markitdown_server
              mcp_tool_name: convert_to_markdown
              tool_args: {uri: "data:text/plain;base64,cmVhY2hhYmlsaXR5IHByb2Jl"}
        chunker:
          tool:
            name: call_mcp_tool
            schema: PreflightCheck
            args:
              server: !expr ctx.chunker_server
              mcp_tool_name: chunk
              tool_args: {text: "reachability probe", size: 50, overlap_ratio: 0.0}
        vectorstore:
          tool:
            name: call_mcp_tool
            schema: PreflightCheck
            args:
              server: !expr ctx.vectorstore_server
              mcp_tool_name: list_metadata
              tool_args: !expr "{db_path: ctx.output_db, limit: 1}"
      collect:
        transform:
          value: >-
            {markitdown: get(pipe, "markitdown", null) != null,
             chunker: get(pipe, "chunker", null) != null,
             vectorstore: get(pipe, "vectorstore", null) != null}
      output: reachable
  - transform:
      value: >-
        [{name: "markitdown (" + ctx.markitdown_server + ")", ok: ctx.reachable.markitdown, remedy: ctx.remedies.markitdown},
         {name: "chunker (" + ctx.chunker_server + ")", ok: ctx.reachable.chunker, remedy: ctx.remedies.chunker},
         {name: "vectorstore (" + ctx.vectorstore_server + ")", ok: ctx.reachable.vectorstore, remedy: ctx.remedies.vectorstore}]
      output: preflight_checks
  - transform:
      value: "count(filter(ctx.preflight_checks, c -> not c.ok)) == 0"
      output: preflight_ok
  - transform:
      value: >-
        join(map(filter(ctx.preflight_checks, c -> not c.ok), c -> c.name + ": " + c.remedy), "\n\n")
      output: preflight_message

  # ---- gate: only proceed to the real ingest work if every server probed
  # OK; otherwise return the decision-enabling message as the run's own
  # output (never a bare exception -- see _blocked below). ----
  - match:
      on: ctx.preflight_ok
      cases:
        "True":
          pipeline: _ingest_body
          pass:
            input_path: ctx.input_path
            output_db: ctx.output_db
            chunk_size: ctx.chunk_size
            chunk_overlap_ratio: ctx.chunk_overlap_ratio
            embedding_model: ctx.embedding_model
            markitdown_server: ctx.markitdown_server
            chunker_server: ctx.chunker_server
            vectorstore_server: ctx.vectorstore_server
            file_extensions: ctx.file_extensions
            max_files: ctx.max_files
            filter_none_conversions: ctx.filter_none_conversions
      default:
        pipeline: _blocked
        pass: {message: ctx.preflight_message}
      output: result
---
pipeline: _blocked
description: >-
  Sibling of ingest -- returns the X1 pre-flight failure as the run's own
  (successful) output: a typed, decision-enabling message naming every
  unreachable MCP server and its concrete remedy, instead of letting a bare
  transport exception (e.g. "ImportError: No module named 'apsw'") reach the
  operator.
steps:
  - transform:
      value: >-
        "rag ingest blocked -- one or more prerequisites are unreachable:\n\n" + ctx.message
      output: blocked_reason
---
pipeline: _ingest_one_file
description: >-
  Convert one file to Markdown (markitdown) and, when the conversion
  actually produced a document, chunk it (chunker). Called once per file by
  ingest's for_each fan-out. Returns this file's OUTCOME:
  {source_path, items, skipped_reason} -- `items` is the candidate chunk
  list ([{source_path, text, content_hash, chunk_index, size_tokens,
  est_tokens}, ...]; the chunker returns content_hash/chunk_index/est_tokens
  itself (#2972), so the only work left is tagging each chunk with the file
  it came from), and `skipped_reason` is "" for an ingested file or the
  operator-facing reason string for a skipped one (the single skipped/not
  representation -- all three ways to yield nothing report through it).
steps:
  - tool:
      name: call_mcp_tool
      args:
        server: !expr ctx.markitdown_server
        mcp_tool_name: convert_to_markdown
        tool_args: !expr "{uri: 'file://' + ctx.source_path}"
      output: converted

  # ---- #3010: the two facts the converter already told us, READ ----
  #
  # Cause 1 -- `meta.isError`. A failed conversion (e.g. a corrupt/zero-byte
  # PDF -> PDFSyntaxError) comes back as an MCP result with `isError: true`,
  # whose `text` IS the error message ("Error executing tool
  # convert_to_markdown: ..."). The MCP layer RAISES NOTHING for it, so
  # ingest's `for_each on_error: continue` never fires -- the step
  # "succeeds" and, before this gate, the error MESSAGE ITSELF was handed to
  # the chunker, embedded (real token spend) and upserted into the store as
  # though it were the document's content.
  #
  # Cause 2 -- `meta.empty`. A file that converts PERFECTLY but holds no
  # text (the scanned PDF with no text layer -- the most common real-corpus
  # case) is NOT an error: markitdown faithfully returns "". reyn renders
  # that legit-empty success as the marker "(no content)" for the chat LLM,
  # and before #3010 the marker was the ONLY form the fact had -- so this
  # pipeline chunked and embedded the literal string "(no content)".
  # `meta.empty` is that same fact as DATA. We read the FACT, never the
  # marker text: string-matching "(no content)" would bind this pipeline to
  # today's chat wording and break silently the day it changes.
  #
  # Both are reported, never silently dropped -- silence over a poisoned
  # index is precisely the bug (`chunks_upserted: 12`, all garbage).
  - transform:
      value: "get(ctx.converted, 'meta.isError', false)"
      output: conversion_failed
  - transform:
      value: "get(ctx.converted, 'meta.empty', false)"
      output: conversion_empty

  # ---- the "None" filter: working around a markitdown BUG ----
  #
  # This is a literal string comparison against a converter's output, which
  # is normally indefensible. It is here because markitdown MANUFACTURES the
  # string "None" out of an unreadable file, and says it succeeded:
  #
  #   markitdown/converters/_plain_text_converter.py -- PlainTextConverter.convert()
  #       else:
  #           text_content = str(from_bytes(file_stream.read()).best())   # <- no None check
  #
  # `charset_normalizer.from_bytes(...).best()` returns None for bytes whose
  # encoding it cannot determine, and `str(None)` == "None". Measured chain
  # (converters instrumented) on a 16-byte non-PDF:
  #
  #   corrupt.pdf (\x00\x01\x02 not a pdf \xff\xfe)
  #     PdfConverter       -> raised PDFSyntaxError "No /Root object!"   (correct)
  #     PlainTextConverter -> SUCCESS  markdown='None'                   (the bug)
  #     final result: 'None'
  #
  # The fixture contains no "None" (16 bytes, hexdump-verified) -- markitdown
  # GENERATES it. And markitdown's own design is right (_markitdown.py:624):
  # `if len(failed_attempts) > 0: raise FileConversionException(...)` -- had
  # PlainTextConverter not "succeeded", the file would have raised and our
  # meta.isError gate above would have caught it. One missing None check
  # disables markitdown's own official error channel, which is why a defense
  # this crude is the only thing left at this layer.
  #
  # EXACT equality, never `"None" in text`: a legitimate document that merely
  # MENTIONS None must not be dropped. Even so, a .txt whose entire content
  # is "None" is CONTENT, not a bug (markitdown detects the charset and takes
  # the `.decode(charset)` branch, correctly returning "None") -- and this
  # pipeline cannot see which branch ran. That false positive is structural,
  # not an oversight, which is why the filter is opt-out
  # (`filter_none_conversions: false`) rather than clever. No extension
  # sniffing: "only distrust .pdf" would be a guess about which converters
  # can hit this path, and the census of markitdown's converters is not ours
  # to keep -- the operator's own opt-out is the honest lever.
  #
  # It converts to an ERROR rather than a silent skip: the file did not
  # convert, so it reports through the same named-with-a-reason path as a
  # raised conversion failure. One reporting path, not three.
  - transform:
      value: "ctx.filter_none_conversions and ctx.converted.text == 'None'"
      output: conversion_is_none

  # The reason strings, built like X1's `preflight_message`: a filtered list
  # + join, since R1 has no conditional expression.
  - transform:
      value: >-
        join(map(filter([{fired: ctx.conversion_failed, why: "conversion failed: " + ctx.converted.text},
                         {fired: ctx.conversion_is_none, why: "conversion returned the literal string \"None\" -- a markitdown bug (PlainTextConverter has no None check on charset detection failure), meaning the file could not be decoded at all. If this document's real content IS \"None\", set filter_none_conversions: false."},
                         {fired: ctx.conversion_empty, why: "no text content extracted (e.g. a scanned PDF with no text layer, or an empty document)"}],
                        r -> r.fired), r -> r.why), "; ")
      output: skip_reason
  - transform:
      value: "ctx.conversion_failed or ctx.conversion_is_none or ctx.conversion_empty"
      output: unusable
  - match:
      on: ctx.unusable
      cases:
        "True":
          pipeline: _ingest_skipped_file
          pass:
            source_path: ctx.source_path
            reason: ctx.skip_reason
      default:
        pipeline: _ingest_chunk_file
        pass:
          source_path: ctx.source_path
          converted_text: ctx.converted.text
          chunk_size: ctx.chunk_size
          chunk_overlap_ratio: ctx.chunk_overlap_ratio
          chunker_server: ctx.chunker_server
      output: outcome
---
pipeline: _ingest_chunk_file
description: >-
  Sibling of _ingest_skipped_file -- the "the conversion produced a
  document" branch: chunk it and tag each chunk with its source file.
  Reached only when the convert step flagged neither `meta.isError` nor
  `meta.empty`, so the chunker/embedder are never handed an error message
  or an explicit-empty marker as if either were content. Carries the
  zero-chunk gate: converting cleanly to no chunks is still "nothing was
  indexed", and is reported as such.
steps:
  - tool:
      name: call_mcp_tool
      args:
        server: !expr ctx.chunker_server
        mcp_tool_name: chunk
        tool_args: !expr "{text: ctx.converted_text, size: ctx.chunk_size, overlap_ratio: ctx.chunk_overlap_ratio}"
      output: chunked
  # Tag each chunk with its source file. content_hash / chunk_index /
  # est_tokens already ride the chunker's own output (#2972) -- R1 could
  # compute none of them (no hash, no enumerate, no string length), which is
  # what used to force this step to shell out to python.
  - transform:
      value: >-
        map(ctx.chunked.structured.result, c -> {source_path: ctx.source_path,
                                                 text: c.text,
                                                 content_hash: c.content_hash,
                                                 chunk_index: c.chunk_index,
                                                 size_tokens: c.token_count,
                                                 est_tokens: c.est_tokens})
      output: items

  # ---- #3010, the SILENT-ZERO gate: a file that yielded no chunks ----
  # The `meta.empty` gate above catches an empty conversion only when the
  # converter says so. It cannot when the converter's MCP server returns
  # structured output alongside its empty text (a `structuredContent`-era
  # MCP SDK sends {"content": "", "structuredContent": {"result": ""}}):
  # reyn carries that as a structured attachment, and an attachment-carrying
  # result never takes the explicit-empty path, so `meta.empty` is absent
  # and `text` is a bare "". Nothing is garbage here -- and nothing is
  # REPORTED either: the file chunks to zero, contributes no items, and
  # vanishes from the run entirely. `files_scanned` counts it; nothing says
  # it produced nothing. That is the same "the operator cannot tell what
  # happened" failure as the garbage, arrived at from the opposite side.
  #
  # So the last word is the STRUCTURAL outcome, not any signal: zero chunks
  # means nothing was indexed, whatever the converter did or did not say.
  # This gate needs no marker, no meta and no SDK assumption -- which is
  # also why it stays even though `meta.empty` usually fires first.
  - transform:
      value: >-
        join(map(filter([{fired: count(ctx.items) == 0,
                          why: "no chunks produced (the document converted, but yielded no text to index)"}],
                        r -> r.fired), r -> r.why), "; ")
      output: zero_chunk_reason
  - transform:
      value: >-
        {source_path: ctx.source_path, items: ctx.items,
         skipped_reason: ctx.zero_chunk_reason}
      output: outcome
---
pipeline: _ingest_skipped_file
description: >-
  Sibling of _ingest_chunk_file -- the "this file yielded no usable
  document" branch. Contributes ZERO chunk items (nothing to chunk, embed or
  index) and carries the reason so the run's summary can NAME the file the
  operator's corpus is missing, instead of the silent-garbage alternative.
steps:
  - transform:
      value: >-
        {source_path: ctx.source_path, items: [], skipped_reason: ctx.reason}
      output: outcome
---
pipeline: _ingest_body
description: >-
  The real ingest work, run only after ingest's X1 pre-flight passes:
  discover files -> per-file convert+chunk+hash (fan-out) -> flatten ->
  diff against the vector store's existing metadata by content_hash (C5:
  add/update/remove) -> embed only the new/changed chunks, stamping
  embedding_model from the RESOLVED model on embed's own envelope meta
  (C4 -- see _ingest_embed_and_upsert) -> upsert + remove -> report a
  summary carrying the X2a METERED spend for the batch plus X5's
  dedup-saved estimate.
steps:
  # ---- file discovery (#2972: reyn's own `glob_files` op, no shell-out) ----
  # One recursive glob pattern per target extension, PLUS input_path itself
  # as a literal pattern -- that one match is what makes "input_path names a
  # single FILE" work: `glob_files` returns files only, so a literal file
  # path matches itself while a literal directory path matches nothing, and
  # the extension patterns do the reverse. Union covers both cases with no
  # is-it-a-file test (R1 cannot stat anything).
  #
  # The extensions live in the PATTERN rather than in an R1 `filter`
  # because R1 has no string-suffix/lower primitive -- there is no
  # expression that says "ends with .pdf". The glob character classes
  # (`[pP][dD][fF]`) get case-insensitivity from the globber instead.
  - transform:
      value: "map(ctx.file_extensions, e -> ctx.input_path + '/**/*.' + e) + [ctx.input_path]"
      output: file_patterns
  - for_each:
      over: ctx.file_patterns
      max_parallel: 4
      on_error: abort
      do:
        tool:
          name: glob_files
          args:
            pattern: !expr item
            # EXPLICIT, load-bearing: glob_files defaults to 50 and truncates
            # SILENTLY past it (#2994). Omit this and file 51+ of a real
            # corpus is dropped with no error anywhere -- the summary would
            # report a files_scanned that is simply wrong.
            max_results: !expr ctx.max_files
      collect: {transform: {value: "pipe"}}
      output: globbed
  # Flatten one list per pattern into one flat file list. `structured` is
  # glob's real list of paths (#2994); before that it was newline-joined
  # text, which R1 (no `split`) could not consume at all -- the reason this
  # step had to be a python shell-out.
  - fold:
      over: ctx.globbed
      init: "[]"
      do: {transform: {value: "acc + item.structured"}}
      output: files

  # Per-file fan-out (concurrent, isolated -- pipeline-dsl.md's for_each):
  # one bad file does not abort the whole ingest (on_error: continue).
  - for_each:
      over: ctx.files
      max_parallel: 4
      on_error: continue
      do:
        call:
          pipeline: _ingest_one_file
          pass:
            source_path: item
            chunk_size: ctx.chunk_size
            chunk_overlap_ratio: ctx.chunk_overlap_ratio
            markitdown_server: ctx.markitdown_server
            chunker_server: ctx.chunker_server
            filter_none_conversions: ctx.filter_none_conversions
      collect: {transform: {value: "pipe"}}
      output: per_file_outcomes

  # Flatten the per-file outcomes' item lists into one flat list of chunk
  # items -- `fold` + list concatenation (R1's `+` also concatenates lists;
  # there is no flatten/flatMap combinator). A skipped file (#3010 cause 1)
  # carries `items: []`, so it contributes nothing here BY CONSTRUCTION --
  # no chunk, no embedding spend, no store entry.
  - fold:
      over: ctx.per_file_outcomes
      init: "[]"
      do: {transform: {value: "acc + item.items"}}
      output: all_items

  # #3010 -- the skipped files, NAMED. `files_scanned` alone cannot tell an
  # operator that a file was discovered but yielded nothing: that is exactly
  # the "clean number over a poisoned index" reporting this bug was made of.
  # Each entry is {source_path, reason} so the summary says WHICH file is
  # absent from the corpus and WHY. A file is skipped iff it carries a
  # reason -- one representation, so the three ways to yield nothing
  # (isError / meta.empty / zero chunks) all report through one path.
  - transform:
      value: >-
        map(filter(ctx.per_file_outcomes, o -> o.skipped_reason != ""),
            o -> {source_path: o.source_path, reason: o.skipped_reason})
      output: skipped_files

  # C5: fetch the existing corpus SCOPED TO THIS input_path (via
  # `parent_context` -- repurposed here as the ingest-root tag stamped on
  # every chunk this pipeline writes, since `list_metadata`'s filter is
  # single-field-equality only, and content_hash/source_path alone can't
  # scope a multi-file "what did THIS folder ingest previously" query).
  - tool:
      name: call_mcp_tool
      args:
        server: !expr ctx.vectorstore_server
        mcp_tool_name: list_metadata
        tool_args: !expr "{db_path: ctx.output_db, filters: {parent_context: ctx.input_path}, limit: 1000000}"
      output: existing_raw
  - transform: {value: "ctx.existing_raw.structured.result", output: existing}

  # C5 diff: new/changed = no existing entry with the SAME identity
  # (source_path + chunk_index) AND the SAME content_hash. remove = an
  # existing entry whose identity is no longer present among the current
  # items (the file was deleted, or re-chunked away).
  #
  # Identity is compared field-wise rather than by a composed id string:
  # the store owns its own key format (#2972) and hands opaque `id` values
  # back through list_metadata, which is what `delete` below consumes. R1
  # could not build such a key anyway (no number -> string coercion).
  - transform:
      value: >-
        filter(ctx.all_items, i -> find(ctx.existing, e -> e.metadata.source_path == i.source_path
                                                       and e.metadata.chunk_index == i.chunk_index
                                                       and e.metadata.content_hash == i.content_hash) == null)
      output: to_upsert
  - transform:
      value: >-
        map(filter(ctx.existing, e -> find(ctx.all_items, i -> i.source_path == e.metadata.source_path
                                                           and i.chunk_index == e.metadata.chunk_index) == null), e -> e.id)
      output: to_remove_ids

  # X5: dedup visibility -- how many chunks were SKIPPED (unchanged), and
  # the tokens that would have been spent re-embedding them. The SKIPPED
  # side is inherently an ESTIMATE (chars/4, the same fallback embed's own
  # provider uses): the only way to know a skipped chunk's true token count
  # is to send it to the embedder, which is exactly the spend the skip
  # exists to avoid. The EMBEDDED side, by contrast, is measured exactly --
  # see the summary step below.
  - transform: {value: "count(ctx.all_items) - count(ctx.to_upsert)", output: unchanged_count}
  - transform: {value: "sum(map(ctx.all_items, i -> i.est_tokens))", output: est_tokens_if_no_dedup}
  - transform: {value: "sum(map(ctx.to_upsert, i -> i.est_tokens))", output: est_tokens_embedded}

  # embed ONLY the new/changed chunks (C1: reyn is the sole embedder). The
  # `embed` tool itself REJECTS an empty `texts` array (a hard "missing
  # required arg" result, not a graceful empty-vectors reply) -- gate it
  # behind a match so a fully-deduped run (X5: to_upsert empty) never calls
  # it at all, rather than feeding it something it refuses.
  - match:
      on: "count(ctx.to_upsert) > 0"
      cases:
        "True":
          pipeline: _ingest_embed_and_upsert
          pass:
            to_upsert: ctx.to_upsert
            embedding_model: ctx.embedding_model
            input_path: ctx.input_path
            output_db: ctx.output_db
            vectorstore_server: ctx.vectorstore_server
        "False":
          pipeline: _ingest_noop_upsert
      output: upsert_outcome

  - tool:
      name: call_mcp_tool
      args:
        server: !expr ctx.vectorstore_server
        mcp_tool_name: delete
        tool_args: !expr "{db_path: ctx.output_db, ids: ctx.to_remove_ids}"
      output: delete_result

  # X2a -- the spend report. `tokens_embedded` / `cost_usd` are embed's OWN
  # METERED figures (envelope meta), not an estimate; `embedding_model` is
  # the model that actually produced the vectors (C4). Only
  # `estimated_tokens_saved_by_dedup` is an estimate, and necessarily so
  # (see the X5 step above) -- its name says which of the two it is.
  - transform:
      value: >-
        {files_scanned: count(ctx.files),
         files_skipped: count(ctx.skipped_files),
         skipped_files: ctx.skipped_files,
         chunks_upserted: ctx.upsert_outcome.upserted,
         chunks_removed: ctx.delete_result.structured.deleted,
         chunks_unchanged_skipped: ctx.unchanged_count,
         embedding_model: ctx.upsert_outcome.model,
         tokens_embedded: ctx.upsert_outcome.tokens,
         cost_usd: ctx.upsert_outcome.cost_usd,
         priced: ctx.upsert_outcome.priced,
         estimated_tokens_saved_by_dedup: ctx.est_tokens_if_no_dedup - ctx.est_tokens_embedded}
      output: summary
---
pipeline: _ingest_embed_and_upsert
description: >-
  Embed the to_upsert chunks and hand them to the vector store's upsert,
  which pairs each item with its vector by position and stamps
  embedding_model + parent_context (C4). Called only when to_upsert is
  non-empty (see ingest's match gate above -- embed rejects an empty texts
  array).
steps:
  - tool:
      name: embed
      args:
        texts: !expr "map(ctx.to_upsert, i -> i.text)"
        embedding_model: !expr ctx.embedding_model
      output: embedded

  # C4 -- stamp the RESOLVED model (`embed`'s own envelope meta), NOT this
  # pipeline's `embedding_model` INPUT. The input is typically a model-CLASS
  # alias ("standard"); writing that into the per-chunk embedding_model
  # column would record a model that never produced these vectors -- the
  # exact "the column becomes a lie" failure FP-0057's C1 hard gate exists
  # to prevent. `envelope.model` is what the provider actually resolved, so
  # C4 holds BY CONSTRUCTION here.
  - transform: {value: "ctx.embedded.meta.model", output: resolved_model}

  # `items` and `vectors` ride as PARALLEL ARRAYS -- upsert pairs them by
  # index server-side (#2972). R1 has no index-zip, which is what used to
  # force a python shell-out between these two steps.
  # `text` is projected away: the store has no column for it, and shipping
  # every chunk's body over stdio a second time (it already went to the
  # chunker and the embedder) is pure waste.
  - transform:
      value: >-
        map(ctx.to_upsert, i -> {source_path: i.source_path,
                                 content_hash: i.content_hash,
                                 chunk_index: i.chunk_index,
                                 size_tokens: i.size_tokens})
      output: upsert_items
  - tool:
      name: call_mcp_tool
      args:
        server: !expr ctx.vectorstore_server
        mcp_tool_name: upsert
        tool_args: !expr >-
          {db_path: ctx.output_db, items: ctx.upsert_items,
           vectors: ctx.embedded.structured,
           embedding_model: ctx.resolved_model,
           parent_context: ctx.input_path}
      output: upsert_result

  # X2a -- the MEASURED spend for this batch (embed's own metered usage),
  # not an estimate. `cost_usd` is null when litellm cannot price the model
  # (an unpriced model degrades VISIBLY, never silently as $0.00 -- the
  # #1829 sentinel), so it is carried through as-is alongside `priced`.
  - transform:
      value: >-
        {upserted: ctx.upsert_result.structured.upserted,
         tokens: ctx.embedded.meta.total_tokens,
         cost_usd: get(ctx.embedded, "meta.cost_usd", null),
         priced: get(ctx.embedded, "meta.priced", false),
         model: ctx.resolved_model}
      output: outcome
---
pipeline: _ingest_noop_upsert
description: >-
  Sibling of _ingest_embed_and_upsert -- the "nothing new to embed" branch
  (X5: a fully-deduped re-ingest), returning the same outcome shape without
  calling embed at all. Spend is a REAL zero here (nothing was embedded),
  hence priced: true -- distinct from the unpriced-model null cost_usd the
  sibling can carry.
steps:
  - transform:
      value: "{upserted: 0, tokens: 0, cost_usd: 0.0, priced: true, model: null}"
      output: outcome
