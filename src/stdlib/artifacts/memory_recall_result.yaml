name: memory_recall_result
description: |
  Memories deemed relevant to a memory_query, with their full content inlined
  so the caller can use them directly without further file I/O.
schema:
  type: object
  properties:
    relevant:
      type: array
      description: Relevant memories. Empty if none were found or all dirs missing.
      items:
        type: object
        properties:
          name:
            type: string
            description: The memory's name (from frontmatter).
          type:
            type: string
            description: 'Memory category: user | feedback | project | reference'
          source:
            type: string
            description: Absolute path to the memory file.
          content:
            type: string
            description: The body of the memory file (frontmatter stripped).
          score:
            type: number
            description: Relevance score assigned by the picker, 0.0 to 1.0.
        required: [name, type, source, content]
  required: [relevant]
