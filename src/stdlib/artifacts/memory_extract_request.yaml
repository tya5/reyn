name: memory_extract_request
description: |
  A conversation segment to be analyzed for durable memories. The skill
  examines the segment and decides what (if anything) should be persisted to
  the project memory directory at `.reyn/memory/`.
schema:
  type: object
  properties:
    conversation_segment:
      type: array
      description: |
        Ordered list of turns to extract memories from. Typically all messages
        since the last successful extraction.
      items:
        type: object
        properties:
          role: {type: string}
          text: {type: string}
          ts:   {type: string}
        required: [role, text]
  required: [conversation_segment]
