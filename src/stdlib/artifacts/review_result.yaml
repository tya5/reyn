name: review_result
description: Structured review of an artifact, with strengths, issues, a quality score, and additional notes.
schema:
  type: object
  properties:
    strengths:
      type: array
      items:
        type: string
      description: Specific things the artifact does well.
    issues:
      type: array
      items:
        type: string
      description: Concrete problems that should be addressed.
    score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Overall quality score from 0.0 (poor) to 1.0 (excellent).
    quality_notes:
      type: array
      items:
        type: string
      description: Additional observations that don't fit neatly into strengths or issues.
  required: [strengths, issues, score, quality_notes]
