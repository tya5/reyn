name: article
description: A written article with title, body, and author's self-assessment.
schema:
  type: object
  properties:
    title:
      type: string
      description: Article headline.
    body:
      type: string
      description: Full article body in prose. May use markdown.
    self_assessment:
      type: string
      description: Author's own evaluation of quality and areas for improvement.
  required: [title, body]
