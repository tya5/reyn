name: lint_result
description: Outcome of linting a DSL directory, including error/warning counts and a summary.
schema:
  type: object
  properties:
    passed:
      type: boolean
      description: True only when error_count is 0. Warnings do not affect pass/fail.
    error_count:
      type: integer
      minimum: 0
      description: Number of errors found. Errors block execution.
    warning_count:
      type: integer
      minimum: 0
      description: Number of warnings found. Warnings are informational only.
    issues:
      type: array
      items:
        type: string
      description: Human-readable list of all issues found, each prefixed with [ERROR] or [WARNING].
    app:
      type: string
      description: The app name that was linted.
    summary:
      type: string
      description: One-paragraph prose summary of the lint outcome.
  required: [passed, error_count, warning_count, issues, app, summary]
