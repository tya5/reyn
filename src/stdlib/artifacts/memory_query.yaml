name: memory_query
description: |
  A request to recall memories relevant to a query. The query is typically the
  user's latest utterance; recent_history provides additional grounding.
  scope_dirs lists the directories whose MEMORY.md indexes should be searched.
schema:
  type: object
  properties:
    query:
      type: string
      description: The text to find relevant memories for.
    recent_history:
      type: array
      description: Recent conversation turns providing additional context.
      items:
        type: object
        properties:
          role: {type: string}
          text: {type: string}
        required: [role, text]
    scope_dirs:
      type: array
      description: |
        Absolute paths to memory directories to search. Each directory is
        expected to contain a MEMORY.md index plus per-memory .md files.
        Missing directories are skipped without error.
      items:
        type: string
    top_k:
      type: integer
      description: Maximum number of memories to return. Defaults to 5.
  required: [query, scope_dirs]
