name: eval_spec_result
description: "Result of generating an eval spec: path written, case count, and instructions for running it."
schema:
  type: object
  properties:
    eval_md_path:
      type: string
      description: Workspace-relative path where the eval spec was written, e.g. "eval_specs/my_app/eval.md".
    app_dsl_path:
      type: string
      description: Path to the target app DSL that the eval spec tests.
    model:
      type: string
      description: Model class or name used to run the target app during eval.
    case_count:
      type: integer
      minimum: 0
      description: Number of test cases in the generated eval spec.
    total_criteria:
      type: integer
      minimum: 0
      description: Total number of schema assertions and quality criteria across all cases and phases.
    next_steps:
      type: string
      description: Instructions for the user on how to re-run or copy the eval spec.
  required: [eval_md_path, app_dsl_path, model, case_count, total_criteria, next_steps]
