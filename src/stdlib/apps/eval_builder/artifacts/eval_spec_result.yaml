name: eval_spec_result
description: Result of generating an eval spec — file path written, case/criterion counts, and a brief summary with the next-step run command.
schema:
  type: object
  properties:
    eval_md_path:
      type: string
      description: Path to the generated eval.md file (typically next to the target app's app.md).
    case_count:
      type: integer
      minimum: 1
      description: Number of test cases in the generated spec.
    criterion_count:
      type: integer
      minimum: 0
      description: Total number of quality criteria across all cases and phases.
    summary:
      type: string
      description: Short prose summary of what was generated and how to run it (e.g. "reyn eval reyn/local/foo/eval.md").
  required: [eval_md_path, case_count, criterion_count, summary]
