name: execution_summary
description: "High-level summary of a target app's test run: success/failure, final output, and globs to locate events and artifacts."
schema:
  type: object
  properties:
    app_dsl_path:
      type: string
      description: Path to the target app DSL that was run.
    success:
      type: boolean
      description: True if the run completed without a fatal error (status == "finished").
    final_output:
      type: object
      description: The target app's final output data as a raw dict.
    events_glob:
      type: string
      description: Glob pattern to find the events JSONL file, e.g. ".reyn/runs/*.jsonl".
    artifacts_glob:
      type: string
      description: Glob pattern to find artifact JSON files, e.g. ".reyn/artifacts/**/*.json".
  required: [app_dsl_path, success, final_output, events_glob, artifacts_glob]
