name: lint_request
description: Structured request to lint a DSL directory, with an optional app name filter.
schema:
  type: object
  properties:
    dsl_root:
      type: string
      description: Path to the DSL directory to lint, e.g. "reyn/project/my_app" or "reyn/".
    app_name:
      type: string
      description: Optional. If set, lint only this app's subdirectory within dsl_root.
  required: [dsl_root]
