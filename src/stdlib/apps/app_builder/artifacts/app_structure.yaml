name: app_structure
description: High-level app structure produced by plan_app — phases, transitions, and artifact names. Does not include artifact schemas.
schema:
  type: object
  properties:
    app_name:
      type: string
      description: snake_case name for the new app.
    app_description:
      type: string
      description: One sentence describing what the app does for its users.
    app_path:
      type: string
      description: Workspace-relative directory where DSL files will be written, e.g. "reyn/local/my_app".
    entry_phase:
      type: string
      description: Name of the first phase to execute when the app is run.
    finish_criteria:
      type: array
      items:
        type: string
      description: 2-4 conditions that must be true for the workflow to be considered complete.
    phases:
      type: array
      description: All phases in the app.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case phase name.
          role:
            type: string
            description: LLM role persona, e.g. "writer", "reviewer".
          model_class:
            type: string
            enum: [light, standard, strong]
            description: "light: simple tasks; standard: most phases; strong: complex reasoning."
          input_artifact:
            type: string
            description: Name of the artifact this phase receives as input.
          instructions:
            type: string
            description: 2-4 sentence domain-logic instructions for this phase's task.
          can_finish:
            type: boolean
            description: True if this phase may end the workflow.
        required: [name, role, input_artifact, instructions]
    transitions:
      type: array
      description: Graph edges defining which phases can follow each phase.
      items:
        type: object
        properties:
          from:
            type: string
            description: Source phase name.
          to:
            type: array
            items:
              type: string
            description: Target phase names.
        required: [from, to]
    artifacts:
      type: array
      description: Artifacts needed by the app's phases — names and descriptions only, no schemas yet.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case artifact name.
          description:
            type: string
            description: One sentence describing what this artifact contains and its purpose.
        required: [name, description]
    final_output:
      type: object
      description: The artifact delivered when the workflow finishes — name and description only.
      properties:
        name:
          type: string
          description: snake_case name for the final output artifact.
        description:
          type: string
          description: One sentence describing what the final output contains.
      required: [name, description]
  required: [app_name, app_description, app_path, entry_phase, finish_criteria, phases, transitions, artifacts, final_output]
