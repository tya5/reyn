name: skill_structure
description: High-level skill structure produced by plan_skill — phases, transitions, and artifact names. Does not include artifact schemas.
schema:
  type: object
  properties:
    skill_name:
      type: string
      description: snake_case name for the new skill.
    skill_description:
      type: string
      description: One sentence describing what the skill does for its users.
    skill_path:
      type: string
      description: Workspace-relative directory where DSL files will be written, e.g. "reyn/local/my_app".
    entry_phase:
      type: string
      description: Name of the first phase to execute when the skill is run.
    finish_criteria:
      type: array
      items:
        type: string
      description: 2-4 conditions that must be true for the workflow to be considered complete.
    phases:
      type: array
      description: All phases in the skill.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case phase name.
          role:
            type: string
            description: LLM role persona, e.g. "writer", "reviewer".
          model_class:
            type: string
            enum: [light, standard, strong]
            description: "light: simple tasks; standard: most phases; strong: complex reasoning."
          input_artifact:
            type: string
            description: Name of the artifact this phase receives as input.
          instructions:
            type: string
            description: 2-4 sentence domain-logic instructions for this phase's task.
          can_finish:
            type: boolean
            description: True if this phase may end the workflow.
        required: [name, role, input_artifact, instructions]
    transitions:
      type: array
      description: Graph edges defining which phases can follow each phase.
      items:
        type: object
        properties:
          from:
            type: string
            description: Source phase name.
          to:
            type: array
            items:
              type: string
            description: Target phase names.
        required: [from, to]
    artifacts:
      type: array
      description: Artifacts needed by the skill's phases — names and descriptions only, no schemas yet.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case artifact name.
          description:
            type: string
            description: One sentence describing what this artifact contains and its purpose.
        required: [name, description]
    final_output:
      type: object
      description: The artifact delivered when the workflow finishes — name and description only.
      properties:
        name:
          type: string
          description: snake_case name for the final output artifact.
        description:
          type: string
          description: One sentence describing what the final output contains.
      required: [name, description]
    mcp_servers:
      type: array
      description: MCP servers recommended for this skill, discovered via mcp_search in plan_skill Step 0. Empty if none needed or skill is self-contained.
      items:
        type: object
        properties:
          name:
            type: string
            description: Registry path of the server (e.g. "tavily-ai/tavily-mcp").
          purpose:
            type: string
            description: One sentence on how this server helps the skill.
          url:
            type: string
            description: Full GitHub URL of the server repository.
        required: [name, purpose]
    lint_issues:
      type: array
      items:
        type: string
      description: Deterministic structural-lint findings injected by the OS preprocessor when this artifact is consumed by design_artifacts. Empty list means the plan is structurally valid. Not produced by plan_skill — leave undefined when emitting this artifact.
  required: [skill_name, skill_description, skill_path, entry_phase, finish_criteria, phases, transitions, artifacts, final_output, mcp_servers]
