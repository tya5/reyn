name: app_request
description: Structured request to build a new app, with name, description, and goal. Preferred over free-text when the caller already has structured requirements.
schema:
  type: object
  description: Structured request to build a new app. Preferred over free-text when the caller already has structured requirements.
  properties:
    app_name:
      type: string
      description: snake_case name for the new app, e.g. "content_summarizer".
    description:
      type: string
      description: One sentence describing what the app does for its users.
    goal:
      type: string
      description: Detailed description of the app's purpose, input, and expected output quality.
  required: [app_name, description, goal]
