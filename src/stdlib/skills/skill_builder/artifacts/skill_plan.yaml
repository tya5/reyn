name: skill_plan
description: Skill plan with artifact schemas, produced by design_artifacts and validated by review_plan before build_skill generates DSL files.
schema:
  type: object
  description: Structured plan produced by plan_skill, consumed by build_skill to generate DSL files.
  properties:
    skill_name:
      type: string
      description: snake_case name for the new skill.
    skill_description:
      type: string
      description: One sentence describing what the skill does for its users.
    skill_path:
      type: string
      description: Workspace-relative directory where DSL files will be written, e.g. "reyn/local/my_app".
    entry_phase:
      type: string
      description: Name of the first phase to execute when the skill is run.
    finish_criteria:
      type: array
      items:
        type: string
      description: 2-4 conditions that must be true for the workflow to be considered complete.
    phases:
      type: array
      description: All phases in the skill, including entry and can_finish phases.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case phase name.
          role:
            type: string
            description: LLM role persona, e.g. "writer", "reviewer", "analyst".
          model_class:
            type: string
            enum: [light, standard, strong]
            description: "light: simple/deterministic tasks; standard: most phases; strong: complex reasoning."
          input_artifact:
            type: string
            description: Name of the artifact this phase receives as input.
          instructions:
            type: string
            description: 2-4 sentence domain-logic instructions for this phase's task.
          can_finish:
            type: boolean
            description: True if this phase may end the workflow by choosing decision=finish.
        required: [name, role, input_artifact, instructions]
    transitions:
      type: array
      description: Graph edges defining which phases can follow each phase.
      items:
        type: object
        properties:
          from:
            type: string
            description: Source phase name.
          to:
            type: array
            items:
              type: string
            description: Target phase names. Must contain only phase names, never artifact names.
        required: [from, to]
    artifacts:
      type: array
      description: All artifact definitions needed by the skill's phases.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case artifact name matching a phase's input_artifact.
          description:
            type: string
            description: One sentence describing what this artifact contains and its purpose.
          schema:
            type: object
            description: JSON Schema object for the artifact's data fields. Must have type=object with properties and required.
        required: [name, description, schema]
    final_output:
      type: object
      description: The artifact delivered to the user when the workflow finishes.
      properties:
        name:
          type: string
          description: snake_case name for the final output artifact.
        description:
          type: string
          description: One sentence describing what the final output contains.
        schema:
          type: object
          description: JSON Schema object for the final output's data fields.
      required: [name, description, schema]
    mcp_servers:
      type: array
      description: MCP servers recommended for this skill (empty if none needed).
      items:
        type: object
        properties:
          name:
            type: string
            description: MCP server name as listed in the registry.
          purpose:
            type: string
            description: One sentence on how this server helps the skill.
          url:
            type: string
            description: Repository or homepage URL of the server.
        required: [name, purpose]
  required: [skill_name, skill_description, skill_path, entry_phase, finish_criteria, phases, transitions, artifacts, final_output, mcp_servers]
