name: skill_builder_result
description: "Result of a successful app build: the app name, path, files written, and lint outcome."
schema:
  type: object
  properties:
    app_name:
      type: string
      description: snake_case name of the generated app.
    app_path:
      type: string
      description: Workspace-relative path to the app directory, e.g. "reyn/local/my_app".
    files_written:
      type: array
      items:
        type: string
      description: List of all file paths written, relative to the workspace root.
    file_count:
      type: integer
      minimum: 0
      description: Total number of files written.
    lint_passed:
      type: boolean
      description: True if the linter found no errors in the generated DSL files.
    lint_issues:
      type: array
      items:
        type: string
      description: List of lint issue strings. Empty when lint_passed is true.
    summary:
      type: string
      description: One sentence describing what the generated app does for its users.
  required: [app_name, app_path, files_written, file_count, lint_passed, lint_issues, summary]
