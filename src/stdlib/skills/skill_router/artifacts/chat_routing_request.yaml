name: chat_routing_request
description: |
  A single user utterance plus the context needed to route it: recent conversation
  history and the catalogue of skills available for invocation.
schema:
  type: object
  properties:
    user_message:
      type: string
      description: The latest user utterance to route.
    history:
      type: array
      description: |
        Recent conversation turns, oldest first. Includes both user messages and
        prior agent replies. May be empty on the first turn.
      items:
        type: object
        properties:
          role:
            type: string
            description: '"user" or "agent"'
          text:
            type: string
            description: The utterance content.
        required: [role, text]
    available_skills:
      type: array
      description: |
        Skills the router may invoke. Resolved by the caller from
        reyn/project, reyn/local, and stdlib paths. The router itself is excluded.
      items:
        type: object
        properties:
          name:
            type: string
            description: Skill name (resolvable by run_skill).
          description:
            type: string
            description: One-line summary of what the skill does.
        required: [name, description]
    relevant_memories:
      type: array
      description: |
        Memories the recall step pulled in for this turn. Use them to ground
        your reply (respect known preferences, refer to prior facts about the
        user). Empty when no memory exists or none were relevant. Don't quote
        memories verbatim; use them as background knowledge.
      items:
        type: object
        properties:
          name:
            type: string
            description: The memory's name.
          type:
            type: string
            description: 'user | feedback | project | reference'
          content:
            type: string
            description: The memory body.
        required: [name, type, content]
    skill_completion:
      type: object
      description: |
        Set when the caller is asking the router to report a just-finished skill
        run to the user. When present, the router's job switches from routing
        to narrating: produce a conversational reply_text describing the result,
        and leave skills_to_run empty unless an obvious follow-up is needed.
        When absent (the normal case), the router routes user_message as usual.
      properties:
        skill:
          type: string
          description: Name of the skill that just finished.
        status:
          type: string
          description: '"finished" | "loop_limit_exceeded" | "failed"'
        result:
          type: object
          description: The skill's final_output data, as-is.
      required: [skill, status, result]
  required: [user_message, history, available_skills]
