name: chat_routing_request
description: |
  A single user utterance plus the context needed to route it. The chat_id
  identifies the session whose history.jsonl the route phase preprocessor
  will read; callers do NOT pre-fill history (the preprocessor populates it).
schema:
  type: object
  properties:
    user_message:
      type: string
      description: The latest user utterance to route.
    chat_id:
      type: string
      description: |
        Chat session id. Used by the route phase preprocessor as the
        canonical session identifier; the actual file path lives in
        `history_path` so pure-mode preprocessor steps can read it
        without computing paths.
    history_path:
      type: string
      description: |
        Absolute / cwd-relative path to the chat session's history.jsonl
        (typically `.reyn/chats/<chat_id>/history.jsonl`). Computed by
        ChatSession at session creation; pure-mode preprocessor steps
        read this verbatim via `args_from` instead of constructing it.
    compaction:
      type: object
      description: |
        Slicing parameters consumed by the route phase preprocessor's
        `slice_chat_history` step. ChatSession populates this from
        `chat.compaction` config; the slicer uses head_size and
        tail_size to determine the HEAD/BODY/TAIL boundaries.
      properties:
        head_size: {type: integer}
        tail_size: {type: integer}
    history:
      type: array
      description: |
        Populated by the route phase preprocessor — callers MUST NOT
        pre-fill this. Slicing strategy lives in the preprocessor so it
        can evolve (token budgeting, compaction summary) without touching
        ChatSession.
      items:
        type: object
        properties:
          role:
            type: string
            description: '"user" or "agent"'
          text:
            type: string
            description: The utterance content.
        required: [role, text]
    available_skills:
      type: array
      description: |
        Skills the router may invoke. Resolved by the caller from
        reyn/project, reyn/local, and stdlib paths. The router itself is excluded.
      items:
        type: object
        properties:
          name:
            type: string
            description: Skill name (resolvable by run_skill).
          description:
            type: string
            description: One-line summary of what the skill does.
          routing:
            type: object
            description: |
              Optional opt-in metadata that helps the router pick this skill.
              Lifted verbatim from the skill's frontmatter. Typical fields:
              `intents` (list of intent labels the skill claims), `when_to_use`,
              `when_not_to_use`, and `examples` (positive/negative phrasings).
              Skills without this block fall back to description-only matching.
        required: [name, description]
  required: [user_message, chat_id, available_skills]
