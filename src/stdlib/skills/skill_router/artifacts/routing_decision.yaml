name: routing_decision
description: |
  How the chat agent should respond to a user utterance. May contain a direct
  reply, skill invocations, or both.
schema:
  type: object
  properties:
    reply_text:
      type: string
      description: |
        Direct conversational reply to show the user. Use for chitchat,
        clarifying questions, acknowledgements, or short answers that do not
        need a skill. Empty string when only skill invocation is appropriate.
    skills_to_run:
      type: array
      description: |
        Skills to invoke for this turn. Empty for pure chitchat. The caller
        launches them; the router does not execute them.
      items:
        type: object
        properties:
          skill:
            type: string
            description: Skill name (must appear in input.available_skills).
          input:
            type: object
            description: |
              Input artifact to pass to the skill. Must follow the form
              {"type": "<artifact_name>", "data": {...}}. For most skills that
              accept natural language, use type "user_message" with a "text" field.
          run_async:
            type: boolean
            description: |
              If true, the caller spawns the skill in the background and the
              user can keep chatting while it runs. If false, the caller blocks
              the next turn until the skill completes. Default true.
        required: [skill, input]
    messages_to_agents:
      type: array
      description: |
        Delegation requests to other agents (PR11+). Pick this when an agent in
        input.available_agents is a better fit than any skill — for example
        when a specialized researcher / editor / architect agent is available.
        ChatSession routes each entry to the target agent's inbox; the
        target's reply is later auto-routed back to this agent's inbox so
        the next router turn can compose a final answer for the user.
      items:
        type: object
        properties:
          to:
            type: string
            description: Target agent name (must appear in input.available_agents).
          request:
            type: string
            description: |
              Free-text request describing what the target agent should do.
              Paraphrase the user's underlying ask in a way that fits the
              target agent's role; don't just forward the user's literal words.
        required: [to, request]
  required: [reply_text, skills_to_run]
