name: phase_eval_request
description: A single phase artifact paired with its evaluation criteria, consumed by judge_phase to produce a structured judgment.
schema:
  type: object
  properties:
    phase_name:
      type: string
      description: Name of the phase whose output is being evaluated.
    artifact_type:
      type: string
      description: Type name of the artifact being evaluated.
    artifact_path:
      type: string
      description: CWD-relative path to the artifact JSON file (e.g. ".reyn/invoke/.../v01_skill_structure.json"). Judge reads this file to get the artifact data.
    criteria:
      type: array
      description: Quality criteria to evaluate the artifact against.
      items:
        type: object
        properties:
          description:
            type: string
            description: The criterion text.
          required:
            type: boolean
            description: True if failing this criterion means the judgment fails overall.
        required: [description]
  required: [phase_name, artifact_path, criteria]
