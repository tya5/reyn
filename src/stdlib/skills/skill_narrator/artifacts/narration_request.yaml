name: narration_request
description: |
  A finished skill run packaged for narration. ChatSession constructs this
  immediately after `agent.run()` returns and passes it to skill_narrator.
schema:
  type: object
  properties:
    skill:
      type: string
      description: Name of the skill that just finished.
    status:
      type: string
      description: |
        Run terminal status. Common values: "finished" | "loop_limit_exceeded".
        Narrator branches on this to phrase failure cases differently.
    result:
      type: object
      description: |
        The skill's final_output `data` field, untouched. Narrator extracts
        meaningful fields from this rather than dumping JSON to the user.
  required: [skill, status, result]
