name: app_analysis
description: Structured analysis of a target app's phases, test cases, and per-phase quality criteria — consumed by write_eval to generate an eval spec.
schema:
  type: object
  properties:
    skill_dsl_path:
      type: string
      description: Path to the target app's app.md as given by the user.
    dsl_root:
      type: string
      description: DSL root inferred from skill_dsl_path, e.g. "reyn/" or "reyn/local/".
    app_name:
      type: string
      description: The app's name from its app.md frontmatter.
    phase_order:
      type: array
      items:
        type: string
      description: |
        Phase names in execution order. MUST be derived from the app's graph alone — start at the entry phase, follow transitions breadth-first, emit each phase once. Phase files that exist on disk but are NOT reachable via graph transitions (orphan files) MUST be excluded — they will not execute, so generating eval criteria for them produces null artifact_path errors at eval time.
    test_cases:
      type: array
      description: Representative test cases that cover different input scenarios.
      items:
        type: object
        properties:
          name:
            type: string
            description: snake_case identifier for the test case.
          input:
            type: string
            description: Realistic user input text to pass to the app.
          rationale:
            type: string
            description: Why this case is a good test — what scenario or edge case it covers.
        required: [name, input, rationale]
    phase_eval_designs:
      type: array
      description: Per-phase quality criteria. One entry per phase in phase_order.
      items:
        type: object
        properties:
          phase:
            type: string
            description: Phase name.
          quality:
            type: array
            items:
              type: string
            description: |
              LLM-judged criteria for this phase's output artifact. Each item is a plain English/Japanese
              sentence describing what the artifact should contain. Optionally prefix with `[aspirational]`
              to mark a criterion as informational (excluded from pass/fail).
        required: [phase, quality]
  required: [skill_dsl_path, dsl_root, app_name, phase_order, test_cases, phase_eval_designs]
