# Reyn project configuration
# Committed to git. For personal overrides, use agent-os.local.yaml (gitignored).
# api_base (proxy URL) belongs in reyn.local.yaml or ~/.reyn/config.yaml.
# API keys must be set as environment variables — never in config files:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, etc.

# Default model class when --model is not specified
model: standard

# Model class → LiteLLM model string
# Three standard tiers. Add custom classes as needed.
models:
  light:    openai/gemini-2.5-flash-lite
  standard: openai/gemini-2.5-flash-lite
  strong:   openai/gemini-2.5-flash-lite

# Runtime bounds. Each value can be overridden per-invocation via the matching CLI flag.
limits:
  llm:
    timeout: 60        # seconds per LLM HTTP call (--llm-timeout)
    max_retries: 3     # transient-error retries per call (--llm-max-retries)
  phase:
    max_visits: 25         # cap per phase per run; 0 = unlimited (--max-phase-visits)
    max_wall_seconds: 0    # per-phase wall-clock budget; 0 = unlimited (--phase-budget)

# `reyn chat` settings
chat:
  memory:
    enabled: true          # extract memories during chat (saved under ./.reyn/memory)
