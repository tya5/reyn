# Reyn project configuration
# Committed to git. For personal overrides, use reyn.local.yaml (gitignored).
# api_base (proxy URL) belongs in reyn.local.yaml or ~/.reyn/config.yaml.
# API keys must be set as environment variables — never in config files:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, etc.

# Default model class when --model is not specified
model: standard

# Model class → LiteLLM model string
# Three standard tiers. Add custom classes as needed.
models:
  light:    gemini-flash-lite
  standard: gemini-flash-lite
  strong:   gemini-pro

# Project-wide context injected into the system prompt for every phase.
# Use this for stable background that all skills should implicitly know
# (project goals, domain glossary, coding conventions, etc.). Pointing this
# at CLAUDE.md is a valid pattern when sharing context with Claude Code.
# Set to "" or a non-existent path to disable.
# project_context_path: REYN.md

# Pre-approve safe-mode Python preprocessor steps. The stdlib skill_router
# uses one (`slice_chat_history`) to slice the chat history; safe mode is
# sandboxed (no file I/O, no untrusted imports) so auto-allow is safe.
# Unsafe-mode steps still require --allow-unsafe-python.
#
# FP-0014 renamed python.pure → python.safe and python.trusted → python.unsafe.
# The implementation only honours the post-rename keys; legacy python.pure
# entries are silently ignored.
permissions:
  python.safe: allow

# Chat session settings. The compaction policy implements the Head/Body/Tail
# strategy: head + tail of the conversation are kept raw (sized by token budget
# via component_weights), the middle is folded into a structured rolling summary
# capped at body_token_cap. Compaction fires at the window-relative elide point
# (effective_trigger); see PR4 in plans/abstract-knitting-moonbeam.md.
# #1128: head_size/tail_size (turn-count) + trigger_total_tokens/min_compact_batch
# were removed — head/tail sizing is now token-budget via component_weights, and
# auto-compaction is window-relative (no 30K-absolute background trigger).
chat:
  compaction:
    body_token_cap: 1500            # Total cap across all summary sections
    section_token_caps:
      topic_arc: 200
      decisions: 400
      pending: 400
      session_user_facts: 200
      artifacts_referenced: 300

# Runtime bounds. Each value can be overridden per-invocation via the matching CLI flag.
limits:
  llm:
    timeout: 60        # seconds per LLM HTTP call (--llm-timeout)
    max_retries: 3     # transient-error retries per call (--llm-max-retries)
  phase:
    max_visits: 25         # cap per phase per run; 0 = unlimited (--max-phase-visits)
    max_wall_seconds: 0    # per-phase wall-clock budget; 0 = unlimited (--phase-budget)
