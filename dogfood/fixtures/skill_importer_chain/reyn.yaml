name: skill_importer_chain_workspace

models:
  light:    gemini-flash-lite
  standard: gemini-flash-lite
  strong:   gemini-pro

# Pre-approve everything skill_search + skill_importer chain needs.
# Workspace is an isolated tmp dir per run, so blanket grants are safe.
permissions:
  shell: allow
  file.write: allow
  web.fetch: allow
  python.unsafe: allow
