#       W6-S2 (plan-affordance gap): per B51 retro, "re-measure to confirm
#         V18/V19 SP interaction vs pre-existing". B52 disambiguates.
#   - LLM noise band ±2-3 V expected at the 36-40% V-rate level.
#
# Measurement-process note (per feedback_pre_conclusion_observation_checklist):
#   - V trajectory comparison vs B51 (= single past anchor, B46 disambiguation
#     discipline) is the headline metric.
#   - 3 carry-over re-measurements above are explicit per-scenario verifications;
