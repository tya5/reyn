#     not surface in V-rate.
#   - skill_search + skill_importer scenarios (if any in current scenario_set)
#     could shift due to URL hardcoding (= REYN_SKILL_REGISTRY_URL override
#     dropped) — bounded risk, scenarios already use the default URL.
#   - B51 carry-over re-measurement axis:
#       W6-S3 (LLM plan_invalid): per B51 retro, "1 observation, may be noise.
#         Re-measure before classifying". B52 = the re-measurement window.
#       W7-S1 (source__read intermittent): per B51 retro, "1 observation".
