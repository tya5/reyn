batch:
  name: B56
  date: "2026-05-26"
  head: 89bacbdf  # post PR #918 (mcp install 3-way + search rename) + #920 (agent lifecycle parity) + #923 (web eager-build)
  env_vars:
    REYN_EMPTY_STOP_RETRY: "1"      # held on (apples-to-apples vs B49-B55)
    REYN_SPAWN_ACK_TO_LLM: "1"      # held on
  user_params:
    hot_list_n: 10                  # held constant vs B43-B55
    models_tier: flash-lite         # weak only per dogfood policy
  hard_caps:
    tool_uses: 50
    wall_clock_min: 15

# B56 = post-B55 batch with 3 new axis-landings since:
#
#   sandbox_2 axis:
#   - PR #920: agent-lifecycle 3-path spawn_ack + task_completed
#     structural symmetry (skill/plan/agent kind/i18n/header 統一)
#   - PR #923: `reyn web --eager-embedding-build` flag parity with
#     `reyn chat`. dogfood_batch_dispatch.py now auto-injects
#     `--eager-embedding-build` to every worker's reyn web command,
#     so search_actions is visible in tools[] from Turn 1 (vs B55 W5
#     where visibility was 2/23 = 8.7%).
#
#   e2e-coder axis:
#   - PR #918: mcp__install_server split 3-way (install_registry /
#     install_package / install_local) + mcp__search_server →
#     mcp__search_registry rename
#   - #909: agent.peer collapse into multi_agent verb category
#
# Primary B56 axes:
#   1. search_actions visibility (PR #923): Turn 1 visibility should
#      be ~100% per worker (smoke verified). Empirical test: does the
#      LLM actually CALL search_actions when semantic queries arrive?
#      Per B55 description-tone analysis (= #924 carry-over), the LLM
#      is biased toward list_actions; #924 fix not yet landed, so
#      B56 should still show low call-rate. This batch establishes
#      the baseline FOR #924 to measure against post-merge.
#   2. agent-lifecycle parity (PR #920): does W5 agent_delegation
#      improve with structural [task_completed] kind=agent injection?
#   3. MCP refactor effect (PR #918): new mcp__install_* verb names —
#      do W5 mcp_install / mcp_search verdicts shift? (Note: PR #918
#      renamed mcp__search_server → mcp__search_registry; W5 scenarios
#      don't pin specific action names in prompts so should adapt.)
#
# Discipline (per feedback_b55_prediction_miss_lessons):
#   - No pre-batch +V prediction made. Calibration miss in B55
#     (= +6-8V predicted vs -2V actual) showed that yaml/code fixes
#     without trace-patch-replay verify are not reliable +V signals.
#   - Honest retro post-batch.
#
# Carry-over from B55 (= not addressed in fix-wave since):
#   - R-2 async eval timing (W2-S5 R)
#   - R-3 chat_compactor threshold redo (W2-S6 R)
#   - R-5a/R-6 S9 events.must_emit_any extension (W5/W3-S9)
#   - 5 regressions B55 (W1-S4/W2-S2/W4-S2/W4-S6/W6-S1) — verify if
#     these reproduce or were noise

workers:
  - name: W1
    scenario_set: chat_router_smoke.yaml
    scenario_set_path: dogfood/scenarios/chat_router_smoke.yaml
    port: 8581
    n_scenarios: 7
