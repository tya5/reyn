  - name: W7
    scenario_set: long_session_v1.yaml
    scenario_set_path: dogfood/scenarios/long_session_v1.yaml
    port: 8267
    n_scenarios: 7
    worktree: /tmp/reyn-worktrees/b46-7
    agent_prefix: dogfood-b46-7-s

# SINGLE past-V anchor (= disambiguation rule #2)
past_batches:
  - name: B45
    aggregate_path: docs/deep-dives/journal/dogfood/2026-05-20-batch-45-regression-triage/aggregate.json

journal_dir: docs/deep-dives/journal/dogfood/2026-05-20-batch-46-disambiguation
