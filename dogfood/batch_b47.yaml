batch:
  name: B47
  date: "2026-05-21"
  head: e6d31b61
  env_vars:
    REYN_EMPTY_STOP_RETRY: "1"      # PR #265 / #287 — held on
    REYN_SPAWN_ACK_TO_LLM: "1"      # PR #290 — accumulation toward default flip
  user_params:
    hot_list_n: 10                  # held constant vs B43-B46
    models_tier: flash-lite
  hard_caps:
    tool_uses: 50
    wall_clock_min: 15

# B47 = "fix landed batch":
# Verifies 5 OS fixes landed in B46 closure round actually translate to
# scenario-level V improvement under live dogfood load:
#   - PR #330 eval spec_path optional (= W2 S7 eval_run_direct_llm)
#   - PR #332 recall defensive args (= W3 S7 recall_indexed_source)
#   - PR #337 hot-list wrapper stdlib fallback (= W2 S6 word_stats_multiline)
#   - PR #338 read_local_files removed (= W2 S2/S3 dropped from scenario set)
#   - PR #358 build_skill strong tier (= W2 S4 skill_builder_web_summariser)
#
# Measurement-process controls held constant from B46 (= disambiguation
# batch baseline):
#   - single past-V anchor (B46 only)
#   - neutral worker prompts (no "regression triage" framing)
#   - same dispatch tool, same sub-agent model (sonnet)
#
# Target: V ≥ 22/50 (= recovers most of B44 23/50 baseline)
# PR #287/#290 evidence accumulation toward N≥50 soft checkpoint
# (current cumulative B44+B45+B46 = retry 11 + spawn_ack 18).

workers:
  - name: W1
    scenario_set: chat_router_smoke.yaml
    scenario_set_path: dogfood/scenarios/chat_router_smoke.yaml
    port: 8271
    n_scenarios: 7
    worktree: /tmp/reyn-worktrees/b47-1
