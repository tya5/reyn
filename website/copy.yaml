# website/copy.yaml — single source of truth for landing page body copy.
#
# index.html uses {{TOKEN}} placeholders. Each value below is inserted as
# raw HTML, so accent words can be wrapped in <em>...</em> to render in the
# brand clay colour (see CSS rules for h1 em / .section-heading em / .what
# p em).
#
# Build:
#   python website/build.py    # writes website/dist/index.html
#
# Workflow when Claude Design regenerates index.html:
#   1. The new index.html should keep the {{TOKEN}} placeholders. The
#      generation prompt in website/_design/claude_design_prompt.md tells
#      Claude Design to preserve them.
#   2. If a regeneration introduces new copy slots, add a matching key
#      here. If a slot disappears, the key becomes unused (build.py warns
#      on unused keys).
#   3. Edit values in this file freely — index.html no longer holds copy.

