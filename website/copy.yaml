# ── architecture.html ───────────────────────────────────────────────────────
# All tokens use the ARCH_ prefix to avoid collision with index.html tokens.
# Page narrative: components → execution flow → horizontal extensions.

ARCH_PAGE_TITLE: "Reyn — How it works"

# ── hero ─────────────────────────────────────────────────────────────────────
ARCH_HERO_EYEBROW: "Architecture"
ARCH_HERO_H1_HTML: "How Reyn <em>works.</em>"
ARCH_HERO_LEDE: >-
  A bird's-eye view of the components that make up Reyn,
  and how they coordinate to execute a single request.

# ── section 01: at a glance ─────────────────────────────────────────────────
ARCH_S01_NUM: "01"
ARCH_S01_LABEL: "At a glance"
ARCH_S01_HEADING_HTML: "The whole system,<br/>on one <em>page.</em>"
ARCH_S01_BODY: >-
  Reyn is built from a small set of components. Agents hold long-lived
  conversations. Skills describe directed phase graphs. Phases loop the LLM
  through one task at a time. The OS runs everything under a strict
  validation contract. Workspace and Events make every step inspectable
  and replayable.

# ── section 02: the pieces ──────────────────────────────────────────────────
ARCH_S02_NUM: "02"
ARCH_S02_LABEL: "The pieces"
ARCH_S02_HEADING_HTML: "Five components.<br/>Sharp <em>boundaries.</em>"
ARCH_S02_BODY: >-
  Each component has one job. Agents don't know about Phases.
  Phases don't know about Skills. The OS is the only layer that touches
  all of them — and it never embeds skill-specific logic.

ARCH_S02_C1_LABEL: "Agent"
ARCH_S02_C1_BODY: >-
  A long-lived ChatSession. RouterLoop dispatches messages to Skills, an
  optional Planner decomposes complex goals, memory scope and skill
  allowlist define what the agent can see and do.

ARCH_S02_C2_LABEL: "Skill"
ARCH_S02_C2_BODY: >-
  A directed graph of Phases. Owns the entry phase, the allowed
  transitions, and the final-output schema. Cycles are first-class —
  revision loops are a feature, not a workaround.

ARCH_S02_C3_LABEL: "Phase"
ARCH_S02_C3_BODY: >-
  The execution unit. Declares an input contract and instructions, runs a
  preprocessor, calls the LLM, dispatches Control IR ops. Loops until it
  decides to transition or finish.

ARCH_S02_C4_LABEL: "OS"
ARCH_S02_C4_BODY: >-
  The runtime engine. Builds context, validates LLM output against
  schemas, executes ops under permission gates, emits an event for every
  state change. Constant; never embeds skill specifics.

ARCH_S02_C5_LABEL: "State"
ARCH_S02_C5_BODY: >-
  Workspace is the single source of truth for inter-phase data.
  Events is an append-only log of every transition, op call, and decision.
  Together they make crash recovery and replay possible.

# ── section 03: a request, end to end ───────────────────────────────────────
ARCH_S03_NUM: "03"
ARCH_S03_LABEL: "A request, end to end"
ARCH_S03_HEADING_HTML: "From message<br/>to <em>reply.</em>"
ARCH_S03_BODY: >-
  A user message arrives at an Agent. The RouterLoop picks a Skill.
  The OS enters the entry Phase, runs its preprocessor, calls the LLM
  with a closed candidate set, and validates the response. Control IR ops
  are dispatched under permission gates and write to the Workspace.
  An event records each step. The Phase either transitions to a peer or
  finishes; the OS validates the final output against the Skill's schema
  and the reply travels back to the user.

# ── section 04: beyond a single agent ───────────────────────────────────────
ARCH_S04_NUM: "04"
ARCH_S04_LABEL: "Beyond a single agent"
ARCH_S04_HEADING_HTML: "Reyn talks <em>out.</em><br/>Reyn is talked <em>to.</em>"
ARCH_S04_BODY: >-
  Agents delegate to other Agents asynchronously through a topology gate
  — network, team, or pipeline — with hop depth capped at three.
  From outside, Reyn exposes itself as an MCP server: Claude Code, Cursor,
  and any MCP-aware client can call list_agents() and send_to_agent().
  Inside Phases, Control IR ops can call external MCP servers as well —
  third-party tools come under the same permission gate and event log
  as everything else.

