# ── section 01: What is Reyn ────────────────────────────────────────────────
S01_NUM: "01"
S01_LABEL: "What is Reyn"
S01_BODY_HTML: >-
  Reyn is a runtime <em>engine</em>, not just an orchestrator.
  <span class="muted">Every LLM transition is gated by a JSON-schema-validated
  contract and a closed candidate set. The LLM decides; the OS enforces.</span>

# ── section 02: How it works ────────────────────────────────────────────────
S02_NUM: "02"
S02_LABEL: "How it works"
S02_HEADING_HTML: "Every action, <em>typed.</em>"
S02_BODY_P1: >-
  The LLM decides what to do next — call a tool, read a Skill's
  instructions, delegate to another agent. Every decision becomes a
  schema-validated Control IR op before it touches the world.
S02_BODY_P2: >-
  The OS dispatches the op under a permission gate you control. Workspace
  and Events make every step inspectable and replayable.

# ── section 03: Key concepts ────────────────────────────────────────────────
S03_NUM: "03"
S03_LABEL: "Key concepts"
S03_HEADING_HTML: "Three <em>primitives.</em> Nothing more."

S03_C1_LABEL: "Agent"
S03_C1_TITLE: "A long-lived process."
S03_C1_BODY: >-
  A scoped runner with a memory window, a permission scope, and a curated
  set of Skills it can invoke.

S03_C2_LABEL: "Skill"
S03_C2_TITLE: "Instructions the model reads."
S03_C2_BODY: >-
  A folder the model chooses to open, not a program the OS executes —
  a menu entry, an on-demand full read, and the assets it bundles.

S03_C3_LABEL: "OS"
S03_C3_TITLE: "An auditable runtime."
S03_C3_BODY: >-
  Builds context, validates every output, executes Control IR ops under
  permission gates. Owns Workspace and Events for state and audit.

